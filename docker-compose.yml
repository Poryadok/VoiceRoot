services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voice}
      POSTGRES_DB: voice
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - voice_pgdata:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d voice"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - voice_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # JetStream-enabled NATS for Messaging → Realtime event fan-out (see docs/CONTRACT_MATRIX.md).
  nats:
    image: nats:2.12-alpine
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_HTTP_PORT:-8222}:8222"
    volumes:
      - voice_nats_js:/data
    command:
      - "-js"
      - "-sd"
      - "/data"
      - "-m"
      - "8222"
      - "-n"
      - "voice-local"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  # Phase-0 app stack (API Gateway + static Flutter web). Opt-in: docker compose --profile app up -d --build
  gateway:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      LISTEN_ADDR: ":8080"
      GATEWAY_REDIS_ADDR: redis:6379
      # Compose dev only: Flutter web may use any localhost port as Origin.
      GATEWAY_CORS_ALLOWED_ORIGINS: "*"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    profiles: ["app"]
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        VOICE_API_BASE_URL: ${VOICE_API_PUBLIC_URL:-http://127.0.0.1:8080}
    ports:
      - "${WEB_PORT:-9080}:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  voice_pgdata:
  voice_redis:
  voice_nats_js:
