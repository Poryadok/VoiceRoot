services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-voice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-voice}
      POSTGRES_DB: voice
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - voice_pgdata:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d voice"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - voice_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # JetStream-enabled NATS for Messaging → Realtime event fan-out (see docs/CONTRACT_MATRIX.md).
  nats:
    image: nats:2.12-alpine
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_HTTP_PORT:-8222}:8222"
    volumes:
      - voice_nats_js:/data
    command:
      - "-js"
      - "-sd"
      - "/data"
      - "-m"
      - "8222"
      - "-n"
      - "voice-local"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  livekit:
    profiles: ["app"]
    image: livekit/livekit-server:latest
    command: ["--config", "/etc/livekit.yaml", "--bind", "0.0.0.0"]
    volumes:
      - ./deploy/livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "${LIVEKIT_PORT:-7880}:7880"
      - "${LIVEKIT_RTC_TCP_PORT:-7881}:7881"
      - "${LIVEKIT_RTC_UDP_PORT:-7882}:7882/udp"

  clamav:
    profiles: ["app"]
    image: clamav/clamav:stable
    ports:
      - "${CLAMAV_PORT:-3310}:3310"

  # Local S3-compatible object storage (MinIO). Not used on staging/prod — Cloudflare R2 there.
  minio:
    profiles: ["app"]
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-voice-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-voice-minio-dev}
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - voice_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio-init:
    profiles: ["app"]
    image: minio/mc:latest
    restart: "no"
    environment:
      MINIO_HOST: minio
      MINIO_PORT: "9000"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-voice-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-voice-minio-dev}
      AVATARS_BUCKET: ${USER_R2_BUCKET:-voice-dev-avatars}
      FILES_BUCKET: ${FILE_R2_BUCKET:-voice-dev-files}
    volumes:
      - ./docker/minio/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    depends_on:
      minio:
        condition: service_started

  # Phase-0 app stack (Auth + API Gateway + static Flutter web). Opt-in: docker compose --profile app up -d --build
  auth:
    profiles: ["app"]
    build:
      context: ./src/backend/auth
      dockerfile: Dockerfile
    environment:
      LOG_LEVEL: debug
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-voice}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-voice}
      AUTH_USER_DB_JDBC_URL: jdbc:postgresql://postgres:5432/user_db
      AUTH_USER_DB_USERNAME: ${POSTGRES_USER:-voice}
      AUTH_USER_DB_PASSWORD: ${POSTGRES_PASSWORD:-voice}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      AUTH_JWT_PRIVATE_KEY_LOCATION: file:/run/jwt.pem
      # Compose dev only: accept TOTP code 000000 for live E2E (see AuthProperties.totp.testBypass).
      AUTH_TOTP_TEST_BYPASS: "true"
    volumes:
      - ./src/backend/auth/src/test/resources/jwt-test-private.pem:/run/jwt.pem:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  social:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: social/Dockerfile
    environment:
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/social_db?sslmode=disable
      SOCIAL_GRPC_LISTEN: :9090
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  user:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: user/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/user_db?sslmode=disable
      USER_GRPC_ADDR: :9090
      SOCIAL_GRPC_ADDR: social:9090
      USER_REDIS_ADDR: redis:6379
      USER_R2_ENDPOINT: ${USER_R2_ENDPOINT:-}
      USER_R2_REGION: ${USER_R2_REGION:-auto}
      USER_R2_ACCESS_KEY_ID: ${USER_R2_ACCESS_KEY_ID:-}
      USER_R2_SECRET_ACCESS_KEY: ${USER_R2_SECRET_ACCESS_KEY:-}
      USER_R2_BUCKET: ${USER_R2_BUCKET:-}
      USER_R2_PUBLIC_BASE_URL: ${USER_R2_PUBLIC_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      compose-db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      social:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  compose-db-init:
    profiles: ["app"]
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-voice}
      PGPASSWORD: ${POSTGRES_PASSWORD:-voice}
      SCHEMA_DIR: /schema
    volumes:
      - ./docker/postgres/ensure-compose-schema.sh:/ensure.sh:ro
      - ./docker/postgres:/schema:ro
    entrypoint: ["/bin/sh", "/ensure.sh"]
    depends_on:
      postgres:
        condition: service_healthy

  chat:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: chat/Dockerfile
    environment:
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/chat_db?sslmode=disable
      SPACE_DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/space_db?sslmode=disable
      CHAT_GRPC_LISTEN: :9090
      SOCIAL_GRPC_ADDR: social:9090
      USER_GRPC_ADDR: user:9090
      MESSAGING_GRPC_ADDR: messaging:9090
      ROLE_GRPC_ADDR: role:9090
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      compose-db-init:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      social:
        condition: service_healthy
      user:
        condition: service_healthy
      role:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  messaging:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: messaging/Dockerfile
    environment:
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/messaging_db?sslmode=disable
      CHAT_DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/chat_db?sslmode=disable
      SPACE_DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/space_db?sslmode=disable
      MESSAGING_GRPC_LISTEN: :9090
      CHAT_GRPC_ADDR: chat:9090
      SOCIAL_GRPC_ADDR: social:9090
      USER_GRPC_ADDR: user:9090
      FILE_GRPC_ADDR: file:9090
      ROLE_GRPC_ADDR: role:9090
      MODERATION_GRPC_ADDR: moderation:9090
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      chat:
        condition: service_healthy
      social:
        condition: service_healthy
      user:
        condition: service_healthy
      file:
        condition: service_healthy
      role:
        condition: service_healthy
      moderation:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 25s

  file:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: file/Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/file_db?sslmode=disable
      FILE_GRPC_LISTEN: :9090
      CHAT_GRPC_ADDR: chat:9090
      CLAMAV_ADDR: clamav:3310
      FILE_R2_ENDPOINT: ${FILE_R2_ENDPOINT:-}
      FILE_R2_REGION: ${FILE_R2_REGION:-auto}
      FILE_R2_ACCESS_KEY_ID: ${FILE_R2_ACCESS_KEY_ID:-}
      FILE_R2_SECRET_ACCESS_KEY: ${FILE_R2_SECRET_ACCESS_KEY:-}
      FILE_R2_BUCKET: ${FILE_R2_BUCKET:-}
    depends_on:
      postgres:
        condition: service_healthy
      chat:
        condition: service_healthy
      clamav:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  matchmaking:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: matchmaking/Dockerfile
    environment:
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/matchmaking_db?sslmode=disable
      MATCHMAKING_GRPC_LISTEN: :9090
      MATCHMAKING_REDIS_ADDR: redis:6379
      CHAT_GRPC_ADDR: chat:9090
      VOICE_GRPC_ADDR: voice:9090
      NATS_URL: nats://nats:4222
      MATCHMAKING_SEARCH_NUDGE_AFTER: ${MATCHMAKING_SEARCH_NUDGE_AFTER:-15m}
      MATCHMAKING_SEARCH_TIMEOUT: ${MATCHMAKING_SEARCH_TIMEOUT:-30m}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chat:
        condition: service_healthy
      voice:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  search:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: search/Dockerfile
    environment:
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/search_db?sslmode=disable
      SEARCH_GRPC_LISTEN: :9090
      NATS_URL: nats://nats:4222
      MESSAGING_GRPC_ADDR: messaging:9090
      CHAT_GRPC_ADDR: chat:9090
      ROLE_GRPC_ADDR: role:9090
      SOCIAL_GRPC_ADDR: social:9090
      USER_GRPC_ADDR: user:9090
      SPACE_GRPC_ADDR: space:9090
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      messaging:
        condition: service_healthy
      chat:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  notification:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: notification/Dockerfile
    ports:
      - "${NOTIFICATION_DEBUG_PORT:-18091}:8080"
    environment:
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/notification_db?sslmode=disable
      NOTIFICATION_GRPC_LISTEN: :9090
      NOTIFICATION_REDIS_ADDR: redis:6379
      NOTIFICATION_RECORD_PUSHES: "true"
      NATS_URL: nats://nats:4222
      USER_GRPC_ADDR: user:9090
      CHAT_GRPC_ADDR: chat:9090
      MESSAGING_GRPC_ADDR: messaging:9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      user:
        condition: service_healthy
      chat:
        condition: service_healthy
      messaging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  subscription:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: subscription/Dockerfile
    environment:
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/subscription_db?sslmode=disable
      SUBSCRIPTION_GRPC_LISTEN: :9090
      PADDLE_WEBHOOK_SECRET: ${PADDLE_WEBHOOK_SECRET:-test-webhook-secret}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  moderation-db-init:
    profiles: ["app"]
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-voice}
      PGPASSWORD: ${POSTGRES_PASSWORD:-voice}
    volumes:
      - ./docker/postgres/ensure-moderation-db.sh:/ensure.sh:ro
      - ./docker/postgres/moderation_db_init.sql.snippet:/schema/moderation_db_init.sql.snippet:ro
    entrypoint: ["/bin/sh", "/ensure.sh"]
    depends_on:
      postgres:
        condition: service_healthy

  moderation:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: moderation/Dockerfile
    environment:
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/moderation_db?sslmode=disable
      MODERATION_GRPC_LISTEN: :9090
      AUTH_GRPC_ADDR: auth:9090
      USER_GRPC_ADDR: user:9090
      MODERATION_PLATFORM_AUDIENCE_SIZE: "1000"
    depends_on:
      postgres:
        condition: service_healthy
      moderation-db-init:
        condition: service_completed_successfully
      user:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  realtime:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: realtime/Dockerfile
    environment:
      LOG_LEVEL: debug
      REALTIME_REDIS_ADDR: redis:6379
      NATS_URL: nats://nats:4222
      REALTIME_JWKS_URL: http://auth:8080/api/v1/auth/.well-known/jwks.json
      REALTIME_JWT_ISSUER: voice-auth
      REALTIME_JWT_AUDIENCE: voice-client
      REALTIME_CHAT_GRPC_ADDR: chat:9090
      REALTIME_USER_GRPC_ADDR: user:9090
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      auth:
        condition: service_healthy
      chat:
        condition: service_healthy
      user:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  space:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: space/Dockerfile
    environment:
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/space_db?sslmode=disable
      SPACE_GRPC_LISTEN: :9090
      ROLE_GRPC_ADDR: role:9090
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      role:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  role:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: role/Dockerfile
    environment:
      LOG_LEVEL: debug
      DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/role_db?sslmode=disable
      ROLE_GRPC_LISTEN: :9090
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      compose-db-init:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  voice:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: voice/Dockerfile
    environment:
      LOG_LEVEL: debug
      VOICE_GRPC_LISTEN: :9090
      VOICE_REDIS_ADDR: redis:6379
      CHAT_GRPC_ADDR: chat:9090
      NATS_URL: nats://nats:4222
      LIVEKIT_URL: ${VOICE_LIVEKIT_PUBLIC_URL:-ws://127.0.0.1:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-secret}
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      livekit:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  gateway:
    profiles: ["app"]
    build:
      context: ./src/backend
      dockerfile: gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-18080}:8080"
    environment:
      LOG_LEVEL: debug
      LISTEN_ADDR: ":8080"
      GATEWAY_REDIS_ADDR: redis:6379
      GATEWAY_REST_UPSTREAMS_JSON: '{"auth":"http://auth:8080"}'
      GATEWAY_GRPC_UPSTREAMS_JSON: '{"users":"user:9090","friends":"social:9090","chats":"chat:9090","messages":"messaging:9090","spaces":"space:9090","roles":"role:9090","voice":"voice:9090","files":"file:9090","notifications":"notification:9090","matchmaking":"matchmaking:9090","search":"search:9090","moderation":"moderation:9090","subscription":"subscription:9090"}'
      GATEWAY_REALTIME_UPSTREAM_URL: http://realtime:8080
      GATEWAY_JWKS_URL: http://auth:8080/api/v1/auth/.well-known/jwks.json
      GATEWAY_JWT_ISSUER: voice-auth
      GATEWAY_JWT_AUDIENCE: voice-client
      # Compose dev: disable shared auth bucket (login/register) for local iteration.
      GATEWAY_RATE_LIMIT_RULES_JSON: '{"Auth":{"limit":0,"window":"15m"}}'
      # Compose dev only: Flutter web may use any localhost port as Origin.
      GATEWAY_CORS_ALLOWED_ORIGINS: "*"
      GATEWAY_DATABASE_URL: postgres://${POSTGRES_USER:-voice}:${POSTGRES_PASSWORD:-voice}@postgres:5432/gateway_db?sslmode=disable
      GATEWAY_VERSION_CONFIGS_JSON: '{"windows":{"min_supported_version":"1.0.0","latest_version":"1.0.0","update_url":"https://updates.voice.example/windows/appcast.xml","release_notes":"Compose dev"},"android":{"min_supported_version":"1.0.0","latest_version":"1.0.0","update_url":"https://play.google.com/store/apps/details?id=voice.app.voice_frontend","release_notes":"","shorebird_patch":0}}'
      # Compose dev: static staff token for moderation admin (checked before JWKS).
      GATEWAY_STATIC_TOKENS_JSON: '{"compose-staff-token":{"user_id":"00000000-0000-0000-0000-000000000099","profile_id":"00000000-0000-0000-0000-000000000199","roles":["staff"]}}'
    depends_on:
      redis:
        condition: service_healthy
      auth:
        condition: service_healthy
      social:
        condition: service_healthy
      user:
        condition: service_healthy
      chat:
        condition: service_healthy
      messaging:
        condition: service_healthy
      space:
        condition: service_healthy
      role:
        condition: service_healthy
      file:
        condition: service_healthy
      realtime:
        condition: service_healthy
      voice:
        condition: service_healthy
      notification:
        condition: service_healthy
      moderation:
        condition: service_healthy
      matchmaking:
        condition: service_healthy
      search:
        condition: service_healthy
      subscription:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    profiles: ["app"]
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        VOICE_API_BASE_URL: ${VOICE_API_PUBLIC_URL:-http://127.0.0.1:18080}
        VOICE_LIVEKIT_URL: ${VOICE_LIVEKIT_PUBLIC_URL:-ws://127.0.0.1:7880}
    ports:
      - "${WEB_PORT:-9080}:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  admin:
    profiles: ["app"]
    build:
      context: ./src/admin
      dockerfile: Dockerfile
      args:
        VITE_VOICE_API_BASE: ${VOICE_API_PUBLIC_URL:-http://127.0.0.1:18080}
        VITE_STAFF_TOKEN: ${ADMIN_STAFF_TOKEN:-compose-staff-token}
    ports:
      - "${ADMIN_PORT:-9081}:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  voice_pgdata:
  voice_redis:
  voice_nats_js:
  voice_minio:
