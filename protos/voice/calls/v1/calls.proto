syntax = "proto3";

package voice.calls.v1;

import "google/protobuf/timestamp.proto";
import "voice/chat/v1/chat.proto";
import "voice/space/v1/space.proto";

option go_package = "voice.app/voice/calls/v1;callsv1";

// Canonical values for room_type strings (StartCallRequest, CallSession).
enum VoiceSessionKind {
  VOICE_SESSION_KIND_UNSPECIFIED = 0;
  VOICE_SESSION_KIND_CALL = 1;
  VOICE_SESSION_KIND_GROUP_VOICE = 2;
  VOICE_SESSION_KIND_VOICE_ROOM = 3;
}

enum CallMediaKind {
  CALL_MEDIA_KIND_UNSPECIFIED = 0;
  CALL_MEDIA_KIND_AUDIO = 1;
  CALL_MEDIA_KIND_VIDEO = 2;
}

enum CallStatus {
  CALL_STATUS_UNSPECIFIED = 0;
  CALL_STATUS_RINGING = 1;
  CALL_STATUS_ACTIVE = 2;
  CALL_STATUS_DECLINED = 3;
  CALL_STATUS_MISSED = 4;
  CALL_STATUS_ENDED = 5;
}

// Voice / LiveKit orchestration. HTTP: /api/v1/voice/**.
// Package voice.calls.v1 avoids path stutter voice/voice/v1; service name matches docs.
service VoiceService {
  rpc StartCall(StartCallRequest) returns (StartCallResponse);
  rpc AcceptCall(AcceptCallRequest) returns (AcceptCallResponse);
  rpc DeclineCall(DeclineCallRequest) returns (DeclineCallResponse);
  rpc JoinCall(JoinCallRequest) returns (JoinCallResponse);
  rpc LeaveCall(LeaveCallRequest) returns (LeaveCallResponse);
  rpc EndCall(EndCallRequest) returns (EndCallResponse);

  rpc JoinVoiceRoom(JoinVoiceRoomRequest) returns (JoinVoiceRoomResponse);
  rpc LeaveVoiceRoom(LeaveVoiceRoomRequest) returns (LeaveVoiceRoomResponse);
  rpc MoveToVoiceRoom(MoveToVoiceRoomRequest) returns (MoveToVoiceRoomResponse);

  rpc GetJoinToken(GetJoinTokenRequest) returns (GetJoinTokenResponse);

  rpc UpdateVoiceState(UpdateVoiceStateRequest) returns (UpdateVoiceStateResponse);
  rpc GetVoiceStates(GetVoiceStatesRequest) returns (GetVoiceStatesResponse);
  rpc GetActiveCall(GetActiveCallRequest) returns (GetActiveCallResponse);

  rpc StartScreenShare(StartScreenShareRequest) returns (StartScreenShareResponse);
  rpc StopScreenShare(StopScreenShareRequest) returns (StopScreenShareResponse);

  rpc SetCommanderMode(SetCommanderModeRequest) returns (SetCommanderModeResponse);

  rpc RaiseHand(RaiseHandRequest) returns (RaiseHandResponse);
  rpc LowerHand(LowerHandRequest) returns (LowerHandResponse);
}

message StartCallRequest {
  string room_type = 1; // call | group_voice | voice_room; prefer room_type_enum when set
  optional voice.chat.v1.ChatRef linked_chat = 2;
  optional string voice_room_id = 3;
  optional voice.space.v1.SpaceRef space = 4;
  optional VoiceSessionKind room_type_enum = 5;
  optional string callee_profile_id = 6;
  optional CallMediaKind media_kind = 7;
}

message AcceptCallRequest {
  string room_id = 1;
}

message DeclineCallRequest {
  string room_id = 1;
}

message JoinCallRequest {
  string room_id = 1;
}

message LeaveCallRequest {
  string room_id = 1;
}

message EndCallRequest {
  string room_id = 1;
}

message CallSession {
  string room_id = 1;
  string livekit_room_name = 2;
  string room_type = 3; // prefer room_type_enum when set
  optional voice.chat.v1.ChatRef linked_chat = 4;
  optional string voice_room_id = 5;
  google.protobuf.Timestamp started_at = 6;
  optional VoiceSessionKind room_type_enum = 7;
  string initiator_profile_id = 8;
  string callee_profile_id = 9;
  CallMediaKind media_kind = 10;
  CallStatus status = 11;
  google.protobuf.Timestamp expires_at = 12;
  google.protobuf.Timestamp ended_at = 13;
}

message JoinVoiceRoomRequest {
  string voice_room_id = 1;
  voice.space.v1.SpaceRef space = 2;
}

message LeaveVoiceRoomRequest {
  string voice_room_id = 1;
}

message MoveToVoiceRoomRequest {
  string from_voice_room_id = 1;
  string to_voice_room_id = 2;
  voice.space.v1.SpaceRef space = 3;
}

message VoiceSession {
  string room_id = 1;
  string livekit_room_name = 2;
  string voice_room_id = 3;
}

message GetJoinTokenRequest {
  string room_id = 1;
}

message UpdateVoiceStateRequest {
  string room_id = 1;
  optional bool is_muted = 2;
  optional bool is_deafened = 3;
  optional bool is_video_on = 4;
}

message GetVoiceStatesRequest {
  string room_id = 1;
  optional string voice_room_id = 2;
}

message VoiceParticipantState {
  string profile_id = 1;
  bool is_muted = 2;
  bool is_deafened = 3;
  bool is_video_on = 4;
  bool is_screen_sharing = 5;
  bool is_commander = 6;
  bool hand_raised = 7;
}

message GetActiveCallRequest {}

message StartScreenShareRequest {
  string room_id = 1;
}

message ScreenShareSession {
  string stream_id = 1;
}

message StopScreenShareRequest {
  string room_id = 1;
  optional string stream_id = 2;
}

message SetCommanderModeRequest {
  string room_id = 1;
  bool enabled = 2;
}

message RaiseHandRequest {
  string room_id = 1;
}

message LowerHandRequest {
  string room_id = 1;
}

message StartCallResponse {
  CallSession call_session = 1;
}
message AcceptCallResponse {
  CallSession call_session = 1;
}
message DeclineCallResponse {
  CallSession call_session = 1;
}
message JoinCallResponse {
  CallSession call_session = 1;
}
message LeaveCallResponse {}
message EndCallResponse {}
message JoinVoiceRoomResponse {
  VoiceSession voice_session = 1;
}
message LeaveVoiceRoomResponse {}
message MoveToVoiceRoomResponse {
  VoiceSession voice_session = 1;
}

// JWT and wall-clock expiry (UTC). Public API uses google.protobuf.Timestamp per docs/REPOSITORIES.md.
message GetJoinTokenResponse {
  string jwt = 1;
  google.protobuf.Timestamp expires_at = 2;
  // WebSocket URL for LiveKit SDK connect (public ingress; not the internal service URL).
  string livekit_url = 3;
}
message UpdateVoiceStateResponse {}
message GetVoiceStatesResponse {
  repeated VoiceParticipantState participants = 1;
}
message GetActiveCallResponse {
  CallSession call_session = 1;
}
message StartScreenShareResponse {
  ScreenShareSession screen_share_session = 1;
}
message StopScreenShareResponse {}
message SetCommanderModeResponse {}
message RaiseHandResponse {}
message LowerHandResponse {}
