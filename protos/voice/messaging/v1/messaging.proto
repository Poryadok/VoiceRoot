syntax = "proto3";

package voice.messaging.v1;

import "google/protobuf/timestamp.proto";
import "voice/chat/v1/chat.proto";
import "voice/common/v1/common.proto";

option go_package = "voice.app/voice/messaging/v1;messagingv1";

// Canonical values for Message.type (string). Prefer message_kind when set — docs/REPOSITORIES.md (Protobuf).
enum MessageKind {
  MESSAGE_KIND_UNSPECIFIED = 0;
  MESSAGE_KIND_REGULAR = 1;
  MESSAGE_KIND_SYSTEM = 2;
  MESSAGE_KIND_FORWARD = 3;
}

// Messages, reactions, pins, read receipts. HTTP: /api/v1/messages/**.
//
// Idempotency (SendMessage): optional client_message_id (UUID), unique per (chat, sender_profile_id).
// Retry with the same key MUST NOT create a second row; response is gRPC OK with the same Message
// body as the first successful attempt. Details: docs/microservices/messaging-service.md.
service MessagingService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc EditMessage(EditMessageRequest) returns (EditMessageResponse);
  rpc DeleteMessage(DeleteMessageRequest) returns (DeleteMessageResponse);
  rpc GetMessages(GetMessagesRequest) returns (GetMessagesResponse);
  rpc GetMessage(GetMessageRequest) returns (GetMessageResponse);

  rpc GetThreadMessages(GetThreadMessagesRequest) returns (GetThreadMessagesResponse);

  rpc AddReaction(AddReactionRequest) returns (AddReactionResponse);
  rpc RemoveReaction(RemoveReactionRequest) returns (RemoveReactionResponse);

  rpc PinMessage(PinMessageRequest) returns (PinMessageResponse);
  rpc UnpinMessage(UnpinMessageRequest) returns (UnpinMessageResponse);
  rpc GetPinnedMessages(GetPinnedMessagesRequest) returns (GetPinnedMessagesResponse);

  rpc ForwardMessage(ForwardMessageRequest) returns (ForwardMessageResponse);

  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);
  rpc GetReadState(GetReadStateRequest) returns (GetReadStateResponse);
  rpc GetBulkReadState(GetBulkReadStateRequest) returns (GetBulkReadStateResponse);
}

message SendMessageRequest {
  voice.chat.v1.ChatRef chat = 1;
  string content = 2;
  optional string client_message_id = 3;
  string attachments_json = 4; // JSON array per docs/messaging-service
  string mentions_json = 5;
  optional string thread_parent_id = 6;
  // Prefer when set; aligns outgoing Message.type / Message.message_kind for new sends (docs/REPOSITORIES.md).
  optional MessageKind message_kind = 7;
}

message EditMessageRequest {
  string message_id = 1;
  string content = 2;
}

message DeleteMessageRequest {
  string message_id = 1;
}

message GetMessagesRequest {
  voice.chat.v1.ChatRef chat = 1;
  optional string after_message_id = 2;
  optional string before_message_id = 3;
  optional string last_message_id = 4;
  voice.common.v1.CursorPageRequest page = 5;
}

message GetMessageRequest {
  string message_id = 1;
}

message MessageList {
  repeated Message messages = 1;
  string next_cursor = 2;
  bool has_more = 3;
  // Optional structured pagination; when set, should mirror next_cursor (as next_cursor) and has_more.
  optional voice.common.v1.CursorPageResponse page = 4;
}

message Message {
  string id = 1; // UUIDv7 application-generated
  voice.chat.v1.ChatRef chat = 2;
  reserved 3;
  reserved "chat_type";
  string sender_profile_id = 4;
  bool posted_as_chat = 5;
  optional string display_chat_id = 6;
  string content = 7;
  string type = 8; // regular | system | forward; prefer message_kind when set (non-breaking migration path)
  optional string thread_parent_id = 9;
  optional string forward_from_id = 10;
  optional string forward_from_sender = 11;
  string attachments_json = 12; // json array
  string mentions_json = 13; // json array
  optional google.protobuf.Timestamp edited_at = 14;
  optional google.protobuf.Timestamp deleted_at = 15;
  google.protobuf.Timestamp created_at = 16;
  optional MessageKind message_kind = 17;
}

message GetThreadMessagesRequest {
  voice.chat.v1.ChatRef chat = 1;
  string thread_parent_id = 2;
  voice.common.v1.CursorPageRequest page = 3;
}

message AddReactionRequest {
  string message_id = 1;
  string emoji = 2;
}

message RemoveReactionRequest {
  string message_id = 1;
  string emoji = 2;
}

message PinMessageRequest {
  voice.chat.v1.ChatRef chat = 1;
  string message_id = 2;
}

message UnpinMessageRequest {
  voice.chat.v1.ChatRef chat = 1;
  string message_id = 2;
}

message GetPinnedMessagesRequest {
  voice.chat.v1.ChatRef chat = 1;
}

message ForwardMessageRequest {
  string source_message_id = 1;
  voice.chat.v1.ChatRef target_chat = 2;
  optional string commentary = 3;
}

message MarkReadRequest {
  voice.chat.v1.ChatRef chat = 1;
  string last_read_message_id = 2;
}

message GetReadStateRequest {
  voice.chat.v1.ChatRef chat = 1;
}

message ReadState {
  voice.chat.v1.ChatRef chat = 1;
  string profile_id = 2;
  string last_read_message_id = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message GetBulkReadStateRequest {
  repeated voice.chat.v1.ChatRef chats = 1;
}

message SendMessageResponse {
  Message message = 1;
}
message EditMessageResponse {
  Message message = 1;
}
message DeleteMessageResponse {}
message GetMessagesResponse {
  MessageList message_list = 1;
}
message GetMessageResponse {
  Message message = 1;
}
message GetThreadMessagesResponse {
  MessageList message_list = 1;
}
message AddReactionResponse {}
message RemoveReactionResponse {}
message PinMessageResponse {}
message UnpinMessageResponse {}
message GetPinnedMessagesResponse {
  MessageList message_list = 1;
}
message ForwardMessageResponse {
  Message message = 1;
}
message MarkReadResponse {}
message GetReadStateResponse {
  ReadState read_state = 1;
}
message GetBulkReadStateResponse {
  map<string, ReadState> by_chat_id = 1;
}
