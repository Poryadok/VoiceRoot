syntax = "proto3";

package voice.role.v1;

import "google/protobuf/timestamp.proto";
import "voice/chat/v1/chat.proto";

option go_package = "voice.app/voice/role/v1;rolev1";

// Roles and permission bitmask in space. HTTP: /api/v1/roles/**.
// Permission names: docs/microservices/role-service.md (SCREAMING_SNAKE_CASE).
service RoleService {
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse);
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse);
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse);
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc ReorderRoles(ReorderRolesRequest) returns (ReorderRolesResponse);

  rpc AssignRole(AssignRoleRequest) returns (AssignRoleResponse);
  rpc RevokeRole(RevokeRoleRequest) returns (RevokeRoleResponse);
  rpc GetMemberRoles(GetMemberRolesRequest) returns (GetMemberRolesResponse);

  rpc SetChatOverride(SetChatOverrideRequest) returns (SetChatOverrideResponse);
  rpc RemoveChatOverride(RemoveChatOverrideRequest) returns (RemoveChatOverrideResponse);
  rpc GetChatOverrides(GetChatOverridesRequest) returns (GetChatOverridesResponse);
  rpc SetVoiceRoomOverride(SetVoiceRoomOverrideRequest) returns (SetVoiceRoomOverrideResponse);
  rpc RemoveVoiceRoomOverride(RemoveVoiceRoomOverrideRequest) returns (RemoveVoiceRoomOverrideResponse);
  rpc GetVoiceRoomOverrides(GetVoiceRoomOverridesRequest) returns (GetVoiceRoomOverridesResponse);

  rpc CheckPermission(CheckPermissionRequest) returns (CheckPermissionResponse);
  rpc GetEffectivePermissions(GetEffectivePermissionsRequest) returns (GetEffectivePermissionsResponse);
}

message Role {
  string id = 1;
  string space_id = 2;
  string name = 3;
  uint64 permissions_mask = 4;
  int32 position = 5;
  bool managed = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreateRoleRequest {
  string space_id = 1;
  string name = 2;
  uint64 permissions_mask = 3;
  int32 position = 4;
}

message UpdateRoleRequest {
  string role_id = 1;
  optional string name = 2;
  optional uint64 permissions_mask = 3;
  optional int32 position = 4;
}

message DeleteRoleRequest {
  string role_id = 1;
}

message ListRolesRequest {
  string space_id = 1;
}

message RoleList {
  repeated Role roles = 1;
}

message ReorderRolesRequest {
  string space_id = 1;
  repeated string ordered_role_ids = 2;
}

message AssignRoleRequest {
  string space_id = 1;
  string profile_id = 2;
  string role_id = 3;
}

message RevokeRoleRequest {
  string space_id = 1;
  string profile_id = 2;
  string role_id = 3;
}

message GetMemberRolesRequest {
  string space_id = 1;
  string profile_id = 2;
}

message SetChatOverrideRequest {
  string space_id = 1;
  voice.chat.v1.ChatRef chat = 2;
  uint64 deny_mask = 3;
  uint64 allow_mask = 4;
}

message RemoveChatOverrideRequest {
  string space_id = 1;
  voice.chat.v1.ChatRef chat = 2;
}

message GetChatOverridesRequest {
  string space_id = 1;
  optional voice.chat.v1.ChatRef filter_chat = 2;
}

message SetVoiceRoomOverrideRequest {
  string space_id = 1;
  string voice_room_id = 2;
  uint64 deny_mask = 3;
  uint64 allow_mask = 4;
}

message RemoveVoiceRoomOverrideRequest {
  string space_id = 1;
  string voice_room_id = 2;
}

message GetVoiceRoomOverridesRequest {
  string space_id = 1;
  optional string voice_room_id = 2;
}

message OverrideList {
  repeated PermissionOverride overrides = 1;
}

message PermissionOverride {
  optional voice.chat.v1.ChatRef chat = 1;
  optional string voice_room_id = 2;
  uint64 deny_mask = 3;
  uint64 allow_mask = 4;
}

message CheckPermissionRequest {
  string space_id = 1;
  string profile_id = 2;
  string permission_name = 3;
  optional voice.chat.v1.ChatRef chat = 4;
  optional string voice_room_id = 5;
}

message CheckPermissionResponse {
  bool allowed = 1;
}

message GetEffectivePermissionsRequest {
  string space_id = 1;
  string profile_id = 2;
  optional voice.chat.v1.ChatRef chat = 3;
  optional string voice_room_id = 4;
}

message PermissionSet {
  uint64 effective_mask = 1;
  repeated string permission_names = 2; // denormalized names for debugging/UI
}

message CreateRoleResponse {
  Role role = 1;
}
message UpdateRoleResponse {
  Role role = 1;
}
message DeleteRoleResponse {}
message ListRolesResponse {
  RoleList role_list = 1;
}
message ReorderRolesResponse {}
message AssignRoleResponse {}
message RevokeRoleResponse {}
message GetMemberRolesResponse {
  RoleList role_list = 1;
}
message SetChatOverrideResponse {}
message RemoveChatOverrideResponse {}
message GetChatOverridesResponse {
  OverrideList override_list = 1;
}
message SetVoiceRoomOverrideResponse {}
message RemoveVoiceRoomOverrideResponse {}
message GetVoiceRoomOverridesResponse {
  OverrideList override_list = 1;
}
message GetEffectivePermissionsResponse {
  PermissionSet permission_set = 1;
}
