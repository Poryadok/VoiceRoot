syntax = "proto3";

package voice.s2s.v1;

option go_package = "voice.app/voice/s2s/v1;s2sv1";

// S2S federation API between a federated node and the master server.
// The node is the gRPC client; the master is the server.
// Account UUID fields use account_id (not user_id); see docs/REPOSITORIES.md (Protobuf).
service FederationService {
  // Persistent bidirectional stream: the node subscribes to events for its hosted spaces.
  // The node sends EventStreamRequest frames (SubscribeRequest / Heartbeat / Ack).
  // The master sends EventStreamResponse on each change (buf STANDARD stream frame names).
  rpc EventStream(stream EventStreamRequest) returns (stream EventStreamResponse);

  // Snapshot sync on reconnect: the node requests current roles and bans for a given space.
  // Called after EventStream reconnects.
  rpc SyncSnapshot(SyncSnapshotRequest) returns (SyncSnapshotResponse);

  // The node asks the master to deliver a push notification via FCM/APNs.
  // Used when the node cannot deliver the push itself (no certificates).
  rpc NotifyUser(NotifyUserRequest) returns (NotifyUserResponse);

  // The node verifies a federated auth token for the user.
  // Called when the user enters a space on the node.
  rpc AuthenticateUser(AuthenticateUserRequest) returns (AuthenticateUserResponse);
}

// ─────────────────────────── Auth ───────────────────────────

message AuthenticateUserRequest {
  string auth_token = 1; // JWT issued by the master for this user
  string space_id = 2; // Space on the node the user is entering
}

message AuthenticateUserResponse {
  bool ok = 1;
  string account_id = 2;
  string profile_id = 3;
  repeated string role_ids = 4; // Roles in this space
  int64 expires_at = 5; // Unix timestamp: token validity end
  string error = 6; // Rejection reason when ok = false
}

// ─────────────────────────── Event Stream ───────────────────────────

// Node → master (client stream).
message EventStreamRequest {
  oneof payload {
    SubscribeRequest subscribe = 1;
    Heartbeat heartbeat = 2;
    Ack ack = 3;
  }
}

message SubscribeRequest {
  string node_id = 1; // Unique node id
  string node_secret = 2; // Shared secret from node registration
  repeated string space_ids = 3; // Space ids this node hosts
}

message Heartbeat {
  int64 timestamp = 1; // Unix send time
}

message Ack {
  string event_id = 1; // Id of the event being acknowledged
}

// Master → node (server stream).
message EventStreamResponse {
  string event_id = 1;
  int64 timestamp = 2;
  string space_id = 3;

  oneof payload {
    RoleChangedEvent role_changed = 10;
    UserBannedEvent user_banned = 11;
    UserUnbannedEvent user_unbanned = 12;
    DefederatedEvent defederated = 13;
    SpaceDeletedEvent space_deleted = 14;
  }
}

message RoleChangedEvent {
  string account_id = 1;
  string profile_id = 2;
  repeated string added_roles = 3;
  repeated string removed_roles = 4;
}

message UserBannedEvent {
  string account_id = 1;
  string profile_id = 2;
  string reason = 3;
  int64 banned_until = 4; // Unix timestamp; 0 = permanent ban
}

message UserUnbannedEvent {
  string account_id = 1;
  string profile_id = 2;
}

message DefederatedEvent {
  string reason = 1; // e.g. policy violation, manual decision
}

message SpaceDeletedEvent {
  // Space removed on master — node must revoke access
}

// ─────────────────────────── Snapshot Sync ───────────────────────────

message SyncSnapshotRequest {
  string node_id = 1;
  string space_id = 2;
}

message SyncSnapshotResponse {
  string space_id = 1;
  repeated RoleEntry roles = 2;
  repeated BanEntry bans = 3;
}

message RoleEntry {
  string account_id = 1;
  string profile_id = 2;
  repeated string role_ids = 3;
}

message BanEntry {
  string account_id = 1;
  string profile_id = 2;
  int64 banned_until = 3; // 0 = permanent
}

// ─────────────────────────── Push Notifications ───────────────────────────

message NotifyUserRequest {
  string account_id = 1;
  string space_id = 2;
  string type = 3; // see enum FederationPushEventType for canonical tokens; prefer type_enum when set
  string preview = 4; // Short text for the push body
  string deep_link = 5; // Optional deep link to open the right screen
  optional FederationPushEventType type_enum = 6;
}

message NotifyUserResponse {
  bool accepted = 1; // false if user not found or master cannot deliver
  string error = 2;
}

// Canonical values for NotifyUserRequest.type (string).
enum FederationPushEventType {
  FEDERATION_PUSH_EVENT_TYPE_UNSPECIFIED = 0;
  FEDERATION_PUSH_EVENT_TYPE_MENTION = 1;
  FEDERATION_PUSH_EVENT_TYPE_DM = 2;
  FEDERATION_PUSH_EVENT_TYPE_MATCH_FOUND = 3;
  FEDERATION_PUSH_EVENT_TYPE_CALL_INCOMING = 4;
}
