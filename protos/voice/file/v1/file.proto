syntax = "proto3";

package voice.file.v1;

import "google/protobuf/timestamp.proto";
import "voice/chat/v1/chat.proto";
import "voice/common/v1/common.proto";

option go_package = "voice.app/voice/file/v1;filev1";

// Canonical values for FileMetadata.status (string). See microservices/file-service.md for lifecycle.
enum FileLifecycleStatus {
  FILE_LIFECYCLE_STATUS_UNSPECIFIED = 0;
  FILE_LIFECYCLE_STATUS_PENDING_UPLOAD = 1;
  FILE_LIFECYCLE_STATUS_PROCESSING = 2;
  FILE_LIFECYCLE_STATUS_READY = 3;
  FILE_LIFECYCLE_STATUS_FAILED = 4;
  FILE_LIFECYCLE_STATUS_DELETED = 5;
}

// Canonical values for FileMetadata.file_type (string).
enum FileMediaCategory {
  FILE_MEDIA_CATEGORY_UNSPECIFIED = 0;
  FILE_MEDIA_CATEGORY_IMAGE = 1;
  FILE_MEDIA_CATEGORY_VIDEO = 2;
  FILE_MEDIA_CATEGORY_AUDIO = 3;
  FILE_MEDIA_CATEGORY_DOCUMENT = 4;
  FILE_MEDIA_CATEGORY_OTHER = 5;
}

// Canonical values for FileMetadata.scan_result (string).
enum FileScanOutcome {
  FILE_SCAN_OUTCOME_UNSPECIFIED = 0;
  FILE_SCAN_OUTCOME_PENDING = 1;
  FILE_SCAN_OUTCOME_CLEAN = 2;
  FILE_SCAN_OUTCOME_INFECTED = 3;
  FILE_SCAN_OUTCOME_ERROR = 4;
  FILE_SCAN_OUTCOME_SKIPPED = 5;
}

// Uploads, R2, scanning. HTTP: /api/v1/files/**.
service FileService {
  rpc RequestUpload(RequestUploadRequest) returns (RequestUploadResponse);
  rpc ConfirmUpload(ConfirmUploadRequest) returns (ConfirmUploadResponse);

  rpc GetFileURL(GetFileURLRequest) returns (GetFileURLResponse);
  rpc GetFileMetadata(GetFileMetadataRequest) returns (GetFileMetadataResponse);
  rpc GetBulkMetadata(GetBulkMetadataRequest) returns (GetBulkMetadataResponse);

  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);

  rpc CheckQuota(CheckQuotaRequest) returns (CheckQuotaResponse);
}

message RequestUploadRequest {
  string original_name = 1;
  string mime_type = 2;
  int64 size_bytes = 3;
  optional voice.chat.v1.ChatRef context_chat = 4;
  reserved 5;
  reserved "chat_type";
}

message UploadResponse {
  string file_id = 1;
  string presigned_put_url = 2;
  string r2_key = 3;
}

message ConfirmUploadRequest {
  string file_id = 1;
  string sha256_hash = 2;
}

message FileMetadata {
  string id = 1;
  string uploader_profile_id = 2;
  string original_name = 3;
  string mime_type = 4;
  int64 size_bytes = 5;
  string sha256_hash = 6;
  string r2_key = 7;
  string status = 8;
  string file_type = 9;
  optional int32 width = 10;
  optional int32 height = 11;
  optional int32 duration_seconds = 12;
  optional string thumbnail_r2_key = 13;
  optional string converted_r2_key = 14;
  optional voice.chat.v1.ChatRef chat = 15;
  reserved 16;
  reserved "chat_type";
  bool is_e2e = 17;
  optional google.protobuf.Timestamp expires_at = 18;
  string scan_result = 19;
  google.protobuf.Timestamp created_at = 20;
  optional FileLifecycleStatus status_enum = 21;
  optional FileMediaCategory file_type_enum = 22;
  optional FileScanOutcome scan_result_enum = 23;
}

message GetFileURLRequest {
  string file_id = 1;
}

message GetFileMetadataRequest {
  string file_id = 1;
}

message GetBulkMetadataRequest {
  repeated string file_ids = 1;
}

message BulkFileMetadata {
  map<string, FileMetadata> by_file_id = 1;
}

message DeleteFileRequest {
  string file_id = 1;
}

message ListFilesRequest {
  optional voice.chat.v1.ChatRef filter_chat = 1;
  voice.common.v1.CursorPageRequest page = 2;
}

message FileList {
  repeated FileMetadata files = 1;
  string next_cursor = 2;
  optional voice.common.v1.CursorPageResponse page = 3;
}

message CheckQuotaRequest {
  string profile_id = 1;
}

message QuotaResponse {
  int64 bytes_used = 1;
  int64 bytes_limit = 2;
}

message RequestUploadResponse {
  UploadResponse upload_response = 1;
}
message ConfirmUploadResponse {
  FileMetadata file_metadata = 1;
}
message GetFileURLResponse {
  string presigned_get_url = 1;
  google.protobuf.Timestamp expires_at = 2;
}
message GetFileMetadataResponse {
  FileMetadata file_metadata = 1;
}
message GetBulkMetadataResponse {
  BulkFileMetadata bulk_file_metadata = 1;
}
message DeleteFileResponse {}
message ListFilesResponse {
  FileList file_list = 1;
}
message CheckQuotaResponse {
  QuotaResponse quota_response = 1;
}
