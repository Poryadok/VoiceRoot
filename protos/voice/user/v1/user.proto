syntax = "proto3";

package voice.user.v1;

import "google/protobuf/timestamp.proto";
import "voice/common/v1/common.proto";

option go_package = "voice.app/voice/user/v1;userv1";

// Canonical values for presence status strings (UpdatePresenceRequest, PresenceStatus).
enum PresenceOnlineStatus {
  PRESENCE_ONLINE_STATUS_UNSPECIFIED = 0;
  PRESENCE_ONLINE_STATUS_ONLINE = 1;
  PRESENCE_ONLINE_STATUS_IDLE = 2;
  PRESENCE_ONLINE_STATUS_DND = 3;
  PRESENCE_ONLINE_STATUS_INVISIBLE = 4;
}

// Canonical values for PrivacySettings.preset (string).
enum PrivacyPreset {
  PRIVACY_PRESET_UNSPECIFIED = 0;
  PRIVACY_PRESET_PERSONAL = 1;
  PRIVACY_PRESET_GAMING = 2;
  PRIVACY_PRESET_WORK = 3;
}

// User Service — profiles, privacy, presence. HTTP: /api/v1/users/**.
service UserService {
  // S2S bootstrap from Auth: ensure one primary profile per account before JWT is issued.
  // Target: called only from trusted Auth; not exposed via public Gateway REST in Phase 1.
  rpc EnsurePrimaryProfile(EnsurePrimaryProfileRequest) returns (EnsurePrimaryProfileResponse);

  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse);
  rpc GetProfiles(GetProfilesRequest) returns (GetProfilesResponse);
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);
  rpc CreateProfile(CreateProfileRequest) returns (CreateProfileResponse);
  rpc DeleteProfile(DeleteProfileRequest) returns (DeleteProfileResponse);
  rpc SwitchProfile(SwitchProfileRequest) returns (SwitchProfileResponse);
  rpc ListMyProfiles(ListMyProfilesRequest) returns (ListMyProfilesResponse);
  // Discover profiles by query (username / display_name) for friend requests and DM addressing.
  // Phase 1 (PLAN): reads user_db; privacy + blocks enforced server-side. Not Search Service (Фаза 9).
  rpc SearchProfiles(SearchProfilesRequest) returns (SearchProfilesResponse);

  rpc GetPrivacySettings(GetPrivacySettingsRequest) returns (GetPrivacySettingsResponse);
  rpc UpdatePrivacySettings(UpdatePrivacySettingsRequest) returns (UpdatePrivacySettingsResponse);

  rpc UpdatePresence(UpdatePresenceRequest) returns (UpdatePresenceResponse);
  rpc GetPresence(GetPresenceRequest) returns (GetPresenceResponse);
  rpc GetBulkPresence(GetBulkPresenceRequest) returns (GetBulkPresenceResponse);

  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse);
  rpc UpdateSettings(UpdateSettingsRequest) returns (UpdateSettingsResponse);

  rpc GetOnboardingState(GetOnboardingStateRequest) returns (GetOnboardingStateResponse);
  rpc CompleteOnboardingStep(CompleteOnboardingStepRequest) returns (CompleteOnboardingStepResponse);

  rpc GetVerificationStatus(GetVerificationStatusRequest) returns (GetVerificationStatusResponse);
  // S2S from Auth after OAuth identity checks (verification.md).
  rpc SetVerification(SetVerificationRequest) returns (SetVerificationResponse);
  rpc ClearVerification(ClearVerificationRequest) returns (ClearVerificationResponse);
  rpc StartOrganizationVerification(StartOrganizationVerificationRequest) returns (StartOrganizationVerificationResponse);
  rpc CheckOrganizationVerification(CheckOrganizationVerificationRequest) returns (CheckOrganizationVerificationResponse);
  rpc ApplyDowngradeProfiles(ApplyDowngradeProfilesRequest) returns (ApplyDowngradeProfilesResponse);

  // Phase 1 (PLAN § R2): presigned PUT to Cloudflare R2 for static profile avatar (no File Service).
  rpc CreateAvatarPresignedUpload(CreateAvatarPresignedUploadRequest) returns (CreateAvatarPresignedUploadResponse);
}

message EnsurePrimaryProfileRequest {
  string account_id = 1;
  // Optional explicit profile UUID (Auth may pre-generate); if empty, User generates id.
  optional string profile_id = 2;
  // Hint for display_name / username base (e.g. email local part).
  string display_hint = 3;
}

message EnsurePrimaryProfileResponse {
  Profile profile = 1;
}

message GetProfileRequest {
  oneof by {
    string profile_id = 1;
    string username = 2;
  }
}

message GetProfilesRequest {
  repeated string profile_ids = 1;
}

message ProfileList {
  repeated Profile profiles = 1;
}

message Profile {
  string id = 1;
  string account_id = 2;
  string username = 3;
  string discriminator = 4;
  string display_name = 5;
  optional string avatar_url = 6;
  optional string banner_url = 7;
  optional string bio = 8;
  optional string custom_status = 9;
  string locale = 10;
  string theme = 11;
  bool is_primary = 12;
  string verification_type = 13;
  optional string verification_badge = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
  optional google.protobuf.Timestamp frozen_at = 17;
}

message UpdateProfileRequest {
  string profile_id = 1;
  optional string display_name = 2;
  optional string avatar_url = 3;
  optional string banner_url = 4;
  optional string bio = 5;
  optional string custom_status = 6;
  optional string locale = 7;
  optional string theme = 8;
}

message CreateProfileRequest {
  string display_name = 1;
  optional string username = 2;
}

message DeleteProfileRequest {
  string profile_id = 1;
}

message SwitchProfileRequest {
  string profile_id = 1;
}

message ListMyProfilesRequest {}

message SearchProfilesRequest {
  string query = 1;
  voice.common.v1.CursorPageRequest page = 2;
}

message SearchProfilesResponse {
  ProfileList profile_list = 1;
  voice.common.v1.CursorPageResponse page = 2;
}

message GetPrivacySettingsRequest {
  string profile_id = 1;
}

message UpdatePrivacySettingsRequest {
  string profile_id = 1;
  PrivacySettings settings = 2;
}

message PrivacySettings {
  string profile_id = 1;
  string preset = 2; // personal | gaming | work; prefer preset_enum when set
  string show_online = 3;
  string show_game_status = 4;
  string show_mm_rating = 5;
  string show_phone = 6;
  string show_stories = 7;
  string allow_dm = 8;
  string allow_friend_requests = 9;
  bool allow_guest_dm = 10;
  google.protobuf.Timestamp updated_at = 11;
  optional PrivacyPreset preset_enum = 12;
}

message UpdatePresenceRequest {
  string status = 1; // online | idle | dnd | invisible; prefer status_enum when set
  optional string game_title = 2;
  optional string custom_status = 3;
  optional string call_info_json = 4;
  optional PresenceOnlineStatus status_enum = 5;
}

message GetPresenceRequest {
  string profile_id = 1;
}

message PresenceStatus {
  string profile_id = 1;
  string status = 2; // prefer status_enum when set
  optional string game_title = 3;
  optional string custom_status = 4;
  google.protobuf.Timestamp last_seen = 5;
  optional string call_info_json = 6;
  optional PresenceOnlineStatus status_enum = 7;
}

message GetBulkPresenceRequest {
  repeated string profile_ids = 1;
}

message GetSettingsRequest {
  string profile_id = 1;
}

message UpdateSettingsRequest {
  string profile_id = 1;
  UserSettings settings = 2;
}

message UserSettings {
  string profile_id = 1;
  string language = 2;
  string theme = 3;
  string notification_prefs_json = 4;
}

message GetOnboardingStateRequest {}

message CompleteOnboardingStepRequest {
  string step_id = 1;
}

message OnboardingState {
  string profile_id = 1;
  repeated string completed_steps = 2;
  bool completed = 3;
  optional google.protobuf.Timestamp completed_at = 4;
}

message CreateAvatarPresignedUploadRequest {
  string profile_id = 1;
  string content_type = 2;
  int64 content_length = 3;
}

message CreateAvatarPresignedUploadResponse {
  string http_method = 1;
  string upload_url = 2;
  map<string, string> required_headers = 3;
  int64 max_bytes = 4;
  google.protobuf.Timestamp expires_at = 5;
  // Value to persist via UpdateProfile.avatar_url after a successful PUT to upload_url.
  string public_url = 6;
  string object_key = 7;
}

message GetVerificationStatusRequest {
  string profile_id = 1;
}

message VerificationStatus {
  string profile_id = 1;
  string verification_type = 2;
  optional string badge = 3;
}

message GetProfileResponse {
  Profile profile = 1;
}
message GetProfilesResponse {
  ProfileList profile_list = 1;
}
message UpdateProfileResponse {
  Profile profile = 1;
}
message CreateProfileResponse {
  Profile profile = 1;
}
message DeleteProfileResponse {}
message SwitchProfileResponse {
  Profile profile = 1;
}
message ListMyProfilesResponse {
  ProfileList profile_list = 1;
}
message GetPrivacySettingsResponse {
  PrivacySettings privacy_settings = 1;
}
message UpdatePrivacySettingsResponse {
  PrivacySettings privacy_settings = 1;
}
message UpdatePresenceResponse {}
message GetPresenceResponse {
  PresenceStatus presence_status = 1;
}
message GetBulkPresenceResponse {
  map<string, PresenceStatus> by_profile_id = 1;
}
message GetSettingsResponse {
  UserSettings user_settings = 1;
}
message UpdateSettingsResponse {
  UserSettings user_settings = 1;
}
message GetOnboardingStateResponse {
  OnboardingState onboarding_state = 1;
}
message CompleteOnboardingStepResponse {
  OnboardingState onboarding_state = 1;
}
message GetVerificationStatusResponse {
  VerificationStatus verification_status = 1;
}

message SetVerificationRequest {
  string profile_id = 1;
  string verification_type = 2; // personal | organization
  optional string badge = 3;
}

message SetVerificationResponse {
  VerificationStatus verification_status = 1;
}

message ClearVerificationRequest {
  string profile_id = 1;
}

message ClearVerificationResponse {
  VerificationStatus verification_status = 1;
}

message StartOrganizationVerificationRequest {
  string profile_id = 1;
  string domain = 2;
}

message StartOrganizationVerificationResponse {
  string domain = 1;
  string txt_record = 2;
}

message CheckOrganizationVerificationRequest {
  string profile_id = 1;
}

message CheckOrganizationVerificationResponse {
  VerificationStatus verification_status = 1;
}

message ApplyDowngradeProfilesRequest {
  string account_id = 1;
  repeated string kept_profile_ids = 2;
}

message ApplyDowngradeProfilesResponse {
  repeated string kept_profile_ids = 1;
}
