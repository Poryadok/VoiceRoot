syntax = "proto3";

package voice.chat.v1;

import "google/protobuf/timestamp.proto";
import "voice/common/v1/common.proto";

option go_package = "voice.app/voice/chat/v1;chatv1";

// Chats — DM, groups, channels. HTTP: /api/v1/chats/**.
service ChatService {
  rpc CreateDM(CreateDMRequest) returns (CreateDMResponse);
  rpc GetDM(GetDMRequest) returns (GetDMResponse);

  rpc CreateChat(CreateChatRequest) returns (CreateChatResponse);
  rpc UpdateChat(UpdateChatRequest) returns (UpdateChatResponse);
  rpc DeleteChat(DeleteChatRequest) returns (DeleteChatResponse);

  rpc AddMembers(AddMembersRequest) returns (AddMembersResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);
  rpc LeaveChat(LeaveChatRequest) returns (LeaveChatResponse);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);

  rpc ListChats(ListChatsRequest) returns (ListChatsResponse);
  rpc GetChat(GetChatRequest) returns (GetChatResponse);

  rpc ListFolders(ListFoldersRequest) returns (ListFoldersResponse);
  rpc CreateFolder(CreateFolderRequest) returns (CreateFolderResponse);
  rpc UpdateFolder(UpdateFolderRequest) returns (UpdateFolderResponse);
  rpc DeleteFolder(DeleteFolderRequest) returns (DeleteFolderResponse);

  rpc MuteChat(MuteChatRequest) returns (MuteChatResponse);
  rpc ArchiveChat(ArchiveChatRequest) returns (ArchiveChatResponse);
}

enum ChatType {
  CHAT_TYPE_UNSPECIFIED = 0;
  CHAT_TYPE_DM = 1;
  CHAT_TYPE_GROUP = 2;
  CHAT_TYPE_CHANNEL = 3;
}

message Chat {
  string id = 1;
  ChatType type = 2;
  optional string space_id = 3;
  optional string name = 4;
  optional string avatar_url = 5;
  optional string topic = 6;
  string creator_profile_id = 7;
  int32 slow_mode_seconds = 8;
  optional google.protobuf.Timestamp last_message_at = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message CreateDMRequest {
  string other_profile_id = 1;
}

message GetDMRequest {
  string other_profile_id = 1;
}

message CreateChatRequest {
  ChatType type = 1;
  optional string space_id = 2;
  optional string name = 3;
  optional string topic = 4;
}

message UpdateChatRequest {
  string chat_id = 1;
  optional string name = 2;
  optional string topic = 3;
  optional int32 slow_mode_seconds = 4;
  optional string avatar_url = 5;
}

message DeleteChatRequest {
  string chat_id = 1;
}

message AddMembersRequest {
  string chat_id = 1;
  repeated string profile_ids = 2;
}

message RemoveMemberRequest {
  string chat_id = 1;
  string profile_id = 2;
}

message LeaveChatRequest {
  string chat_id = 1;
}

message ListMembersRequest {
  string chat_id = 1;
  voice.common.v1.CursorPageRequest page = 2;
}

message MemberList {
  repeated ChatMember members = 1;
  string next_cursor = 2;
}

message ChatMember {
  string profile_id = 1;
  string role = 2; // owner | admin | member
  google.protobuf.Timestamp joined_at = 3;
  optional google.protobuf.Timestamp muted_until = 4;
  bool is_archived = 5;
}

message ListChatsRequest {
  voice.common.v1.CursorPageRequest page = 1;
}

message ChatList {
  repeated Chat chats = 1;
  string next_cursor = 2;
}

message GetChatRequest {
  string chat_id = 1;
}

message ListFoldersRequest {}

message FolderList {
  repeated Folder folders = 1;
}

message Folder {
  string id = 1;
  string name = 2;
  string folder_type = 3; // system | custom
  string filter_config_json = 4;
  int32 sort_order = 5;
}

message CreateFolderRequest {
  string name = 1;
  string filter_config_json = 2;
}

message UpdateFolderRequest {
  string folder_id = 1;
  optional string name = 2;
  optional string filter_config_json = 3;
  optional int32 sort_order = 4;
}

message DeleteFolderRequest {
  string folder_id = 1;
}

message MuteChatRequest {
  string chat_id = 1;
  optional google.protobuf.Timestamp muted_until = 2;
}

message ArchiveChatRequest {
  string chat_id = 1;
  bool archived = 2;
}

// Cross-service pointer to chat_db.chats (docs/DATA_MODEL.md). Use in other packages instead of parallel chat_id + chat_type strings.
message ChatRef {
  string id = 1;
  optional ChatType type = 2;
}

message CreateDMResponse {
  Chat chat = 1;
}
message GetDMResponse {
  Chat chat = 1;
}
message CreateChatResponse {
  Chat chat = 1;
}
message UpdateChatResponse {
  Chat chat = 1;
}
message DeleteChatResponse {}
message AddMembersResponse {}
message RemoveMemberResponse {}
message LeaveChatResponse {}
message ListMembersResponse {
  MemberList member_list = 1;
}
message ListChatsResponse {
  ChatList chat_list = 1;
}
message GetChatResponse {
  Chat chat = 1;
}
message ListFoldersResponse {
  FolderList folder_list = 1;
}
message CreateFolderResponse {
  Folder folder = 1;
}
message UpdateFolderResponse {
  Folder folder = 1;
}
message DeleteFolderResponse {}
message MuteChatResponse {}
message ArchiveChatResponse {}
