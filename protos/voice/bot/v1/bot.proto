syntax = "proto3";

package voice.bot.v1;

import "google/protobuf/timestamp.proto";
import "voice/chat/v1/chat.proto";
import "voice/messaging/v1/messaging.proto";

option go_package = "voice.app/voice/bot/v1;botv1";

// Canonical values for Bot.status (string).
enum BotLifecycleStatus {
  BOT_LIFECYCLE_STATUS_UNSPECIFIED = 0;
  BOT_LIFECYCLE_STATUS_DRAFT = 1;
  BOT_LIFECYCLE_STATUS_LIVE = 2;
  BOT_LIFECYCLE_STATUS_DISABLED = 3;
}

// Bot platform. HTTP: /api/v1/bots/**.
service BotService {
  rpc RegisterBot(RegisterBotRequest) returns (RegisterBotResponse);
  rpc UpdateBot(UpdateBotRequest) returns (UpdateBotResponse);
  rpc DeleteBot(DeleteBotRequest) returns (DeleteBotResponse);
  rpc GetBot(GetBotRequest) returns (GetBotResponse);
  rpc ListBots(ListBotsRequest) returns (ListBotsResponse);
  rpc RegenerateToken(RegenerateTokenRequest) returns (RegenerateTokenResponse);

  rpc RegisterCommands(RegisterCommandsRequest) returns (RegisterCommandsResponse);
  rpc GetCommands(GetCommandsRequest) returns (GetCommandsResponse);

  rpc SetWebhookURL(SetWebhookURLRequest) returns (SetWebhookURLResponse);
  rpc GetWebhookURL(GetWebhookURLRequest) returns (GetWebhookURLResponse);

  rpc SetChatWhitelist(SetChatWhitelistRequest) returns (SetChatWhitelistResponse);
  rpc GetChatWhitelist(GetChatWhitelistRequest) returns (GetChatWhitelistResponse);

  rpc SendBotMessage(SendBotMessageRequest) returns (SendBotMessageResponse);
  rpc EditBotMessage(EditBotMessageRequest) returns (EditBotMessageResponse);
  rpc SendEphemeral(SendEphemeralRequest) returns (SendEphemeralResponse);
  rpc DeferResponse(DeferResponseRequest) returns (DeferResponseResponse);

  rpc PollEvents(PollEventsRequest) returns (stream PollEventsResponse);

  // Manifest (Developer Portal).
  rpc ValidateManifest(ValidateManifestRequest) returns (ValidateManifestResponse);
  rpc ApplyManifest(ApplyManifestRequest) returns (ApplyManifestResponse);

  // Space lifecycle.
  rpc InstallBotInSpace(InstallBotInSpaceRequest) returns (InstallBotInSpaceResponse);
  rpc UninstallBotFromSpace(UninstallBotFromSpaceRequest) returns (UninstallBotFromSpaceResponse);
  rpc ListInstalledBots(ListInstalledBotsRequest) returns (ListInstalledBotsResponse);
  rpc ListBotsInChat(ListBotsInChatRequest) returns (ListBotsInChatResponse);
  rpc SetBotChatEnabled(SetBotChatEnabledRequest) returns (SetBotChatEnabledResponse);

  // Client slash interactions.
  rpc ExecuteSlashInteraction(ExecuteSlashInteractionRequest) returns (ExecuteSlashInteractionResponse);
  rpc ListSlashCommandsForChat(ListSlashCommandsForChatRequest) returns (ListSlashCommandsForChatResponse);
  rpc CompleteInteraction(CompleteInteractionRequest) returns (CompleteInteractionResponse);
  rpc AutocompleteSlashOption(AutocompleteSlashOptionRequest) returns (AutocompleteSlashOptionResponse);

  // BOT-C: presence, scopes runtime, history gate.
  rpc TouchPresence(TouchPresenceRequest) returns (TouchPresenceResponse);
  rpc AssignBotRole(AssignBotRoleRequest) returns (AssignBotRoleResponse);
  rpc RevokeBotRole(RevokeBotRoleRequest) returns (RevokeBotRoleResponse);
  rpc ListSpaceMembersForBot(ListSpaceMembersForBotRequest) returns (ListSpaceMembersForBotResponse);
  rpc CreateBotChat(CreateBotChatRequest) returns (CreateBotChatResponse);
  rpc GetChatMessagesForBot(GetChatMessagesForBotRequest) returns (GetChatMessagesForBotResponse);
}

message Bot {
  string id = 1;
  string owner_account_id = 2;
  string name = 3;
  string description = 4;
  optional string avatar_url = 5;
  optional string webhook_url = 6;
  bool is_polling_mode = 7;
  string scopes_json = 8;
  string status = 9; // prefer status_enum when set
  google.protobuf.Timestamp created_at = 10;
  optional BotLifecycleStatus status_enum = 11;
  // Actor profile used as sender_profile_id for bot messages.
  optional string actor_profile_id = 12;
}

message RegisterBotRequest {
  string name = 1;
  string description = 2;
  string scopes_json = 3;
}

message UpdateBotRequest {
  string bot_id = 1;
  optional string name = 2;
  optional string description = 3;
  optional string avatar_url = 4;
  optional string scopes_json = 5;
}

message DeleteBotRequest {
  string bot_id = 1;
}

message GetBotRequest {
  string bot_id = 1;
}

message ListBotsRequest {}

message BotList {
  repeated Bot bots = 1;
}

message RegenerateTokenRequest {
  string bot_id = 1;
}

message TokenResponse {
  string token = 1;
}

message RegisterCommandsRequest {
  string bot_id = 1;
  string commands_json = 2;
}

message GetCommandsRequest {
  string bot_id = 1;
}

message CommandList {
  string commands_json = 1;
}

message SetWebhookURLRequest {
  string bot_id = 1;
  string url = 2;
}

message GetWebhookURLRequest {
  string bot_id = 1;
}

message SetChatWhitelistRequest {
  string bot_id = 1;
  repeated voice.chat.v1.ChatRef allowed_chats = 2;
}

message GetChatWhitelistRequest {
  string bot_id = 1;
}

message SendBotMessageRequest {
  string bot_id = 1;
  voice.chat.v1.ChatRef chat = 2;
  string content = 3;
  optional string thread_parent_id = 4;
  optional string interaction_token = 5;
}

message EditBotMessageRequest {
  string bot_id = 1;
  string message_id = 2;
  string content = 3;
}

message SendEphemeralRequest {
  string bot_id = 1;
  voice.chat.v1.ChatRef chat = 2;
  string target_profile_id = 3;
  string content = 4;
}

message DeferResponseRequest {
  string bot_id = 1;
  string interaction_token = 2;
}

message PollEventsRequest {
  string bot_id = 1;
  optional string cursor = 2;
}

message BotEvent {
  string event_id = 1;
  string event_type = 2;
  string payload_json = 3;
  google.protobuf.Timestamp created_at = 4;
}

message RegisterBotResponse {
  Bot bot = 1;
  // One-shot bot token; same value as RegenerateToken (shown once at registration).
  optional TokenResponse token_response = 2;
}
message UpdateBotResponse {
  Bot bot = 1;
}
message DeleteBotResponse {}
message GetBotResponse {
  Bot bot = 1;
}
message ListBotsResponse {
  BotList bot_list = 1;
}
message RegenerateTokenResponse {
  TokenResponse token_response = 1;
}
message RegisterCommandsResponse {}
message GetCommandsResponse {
  CommandList command_list = 1;
}
message SetWebhookURLResponse {}
message GetWebhookURLResponse {
  optional string url = 1;
}
message SetChatWhitelistResponse {}
message GetChatWhitelistResponse {
  repeated voice.chat.v1.ChatRef allowed_chats = 1;
}
message SendBotMessageResponse {
  voice.messaging.v1.Message message = 1;
}
message EditBotMessageResponse {
  voice.messaging.v1.Message message = 1;
}
message SendEphemeralResponse {}
message DeferResponseResponse {}
message PollEventsResponse {
  BotEvent bot_event = 1;
}

message ValidateManifestRequest {
  string manifest_yaml = 1;
}

message ValidateManifestResponse {
  bool valid = 1;
  repeated string errors = 2;
  optional string normalized_manifest_json = 3;
}

message ApplyManifestRequest {
  string bot_id = 1;
  string manifest_yaml = 2;
}

message ApplyManifestResponse {
  Bot bot = 1;
}

message InstallBotInSpaceRequest {
  string bot_id = 1;
  string space_id = 2;
  repeated voice.chat.v1.ChatRef allowed_chats = 3;
  // Required true when bot manifest includes privileged scopes (e.g. TEXT_CHAT_READ_HISTORY).
  bool acknowledge_privileged_scopes = 4;
}

message InstallBotInSpaceResponse {
  string installation_id = 1;
}

message UninstallBotFromSpaceRequest {
  string bot_id = 1;
  string space_id = 2;
}

message UninstallBotFromSpaceResponse {}

message ListInstalledBotsRequest {
  string space_id = 1;
}

message InstalledBot {
  Bot bot = 1;
  string installation_id = 2;
  repeated voice.chat.v1.ChatRef allowed_chats = 3;
}

message ListInstalledBotsResponse {
  repeated InstalledBot installed_bots = 1;
}

message ListBotsInChatRequest {
  voice.chat.v1.ChatRef chat = 1;
  string space_id = 2;
}

message ChatBotEntry {
  Bot bot = 1;
  bool enabled = 2;
  bool whitelisted = 3;
}

message ListBotsInChatResponse {
  repeated ChatBotEntry bots = 1;
}

message SetBotChatEnabledRequest {
  string bot_id = 1;
  voice.chat.v1.ChatRef chat = 2;
  bool enabled = 3;
  string space_id = 4;
}

message SetBotChatEnabledResponse {}

message SlashCommandOption {
  string name = 1;
  string type = 2;
  bool required = 3;
  bool autocomplete = 4;
}

message SlashCommand {
  string bot_id = 1;
  string bot_name = 2;
  string name = 3;
  string description = 4;
  repeated SlashCommandOption options = 5;
  // Parent command for subcommands, e.g. "queue" for "/queue join".
  optional string group_name = 6;
  // False when bot is offline (BOT-C will drive heartbeat; default true until then).
  bool online = 7;
}

message ListSlashCommandsForChatRequest {
  voice.chat.v1.ChatRef chat = 1;
}

message ListSlashCommandsForChatResponse {
  repeated SlashCommand commands = 1;
}

message ExecuteSlashInteractionRequest {
  voice.chat.v1.ChatRef chat = 1;
  string bot_id = 2;
  string command_name = 3;
  string options_json = 4;
}

message ExecuteSlashInteractionResponse {
  string interaction_token = 1;
  optional string content = 2;
  bool is_ephemeral = 3;
  bool deferred = 4;
  optional voice.messaging.v1.Message message = 5;
  optional string error_code = 6;
  optional string error_message = 7;
}

message CompleteInteractionRequest {
  string interaction_token = 1;
  string content = 2;
  bool is_ephemeral = 3;
  bool deferred = 4;
}

message CompleteInteractionResponse {
  optional voice.messaging.v1.Message message = 1;
}

message AutocompleteSlashOptionRequest {
  voice.chat.v1.ChatRef chat = 1;
  string bot_id = 2;
  string command_name = 3;
  string option_name = 4;
  string focused_value = 5;
  string options_json = 6;
}

message AutocompleteChoice {
  string name = 1;
  string value = 2;
}

message AutocompleteSlashOptionResponse {
  repeated AutocompleteChoice choices = 1;
}

message TouchPresenceRequest {
  string bot_id = 1;
}

message TouchPresenceResponse {}

message AssignBotRoleRequest {
  string space_id = 1;
  string profile_id = 2;
  string role_id = 3;
}

message AssignBotRoleResponse {}

message RevokeBotRoleRequest {
  string space_id = 1;
  string profile_id = 2;
  string role_id = 3;
}

message RevokeBotRoleResponse {}

message ListSpaceMembersForBotRequest {
  string space_id = 1;
  optional string cursor = 2;
}

message ListSpaceMembersForBotResponse {
  repeated string profile_ids = 1;
  optional string next_cursor = 2;
}

message CreateBotChatRequest {
  string space_id = 1;
  string name = 2;
  // "group" or "channel"
  string chat_type = 3;
}

message CreateBotChatResponse {
  voice.chat.v1.ChatRef chat = 1;
}

message GetChatMessagesForBotRequest {
  voice.chat.v1.ChatRef chat = 1;
  optional string cursor = 2;
}

message GetChatMessagesForBotResponse {
  repeated string message_ids = 1;
  optional string next_cursor = 2;
}
