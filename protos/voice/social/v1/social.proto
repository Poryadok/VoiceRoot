syntax = "proto3";

package voice.social.v1;

import "google/protobuf/timestamp.proto";
import "voice/common/v1/common.proto";

option go_package = "voice.app/voice/social/v1;socialv1";

// Social graph — friends, contacts, blocks. HTTP: /api/v1/friends/**.
service SocialService {
  rpc SendFriendInvitation(SendFriendInvitationRequest) returns (SendFriendInvitationResponse);
  rpc AcceptFriendInvitation(AcceptFriendInvitationRequest) returns (AcceptFriendInvitationResponse);
  rpc DeclineFriendInvitation(DeclineFriendInvitationRequest) returns (DeclineFriendInvitationResponse);
  rpc RemoveFriend(RemoveFriendRequest) returns (RemoveFriendResponse);
  rpc ListFriends(ListFriendsRequest) returns (ListFriendsResponse);
  rpc ListFriendRequests(ListFriendRequestsRequest) returns (ListFriendRequestsResponse);

  rpc AddContact(AddContactRequest) returns (AddContactResponse);
  rpc RemoveContact(RemoveContactRequest) returns (RemoveContactResponse);
  rpc ListContacts(ListContactsRequest) returns (ListContactsResponse);
  rpc SyncPhoneContacts(SyncPhoneContactsRequest) returns (SyncPhoneContactsResponse);

  rpc SetFavorite(SetFavoriteRequest) returns (SetFavoriteResponse);
  rpc ListFavorites(ListFavoritesRequest) returns (ListFavoritesResponse);

  rpc BlockAccount(BlockAccountRequest) returns (BlockAccountResponse);
  rpc UnblockAccount(UnblockAccountRequest) returns (UnblockAccountResponse);
  rpc ListBlocked(ListBlockedRequest) returns (ListBlockedResponse);
  rpc IsBlocked(IsBlockedRequest) returns (IsBlockedResponse);

  rpc AreFriends(AreFriendsRequest) returns (AreFriendsResponse);
  rpc GetFriendsOfFriends(GetFriendsOfFriendsRequest) returns (GetFriendsOfFriendsResponse);
}

message SendFriendInvitationRequest {
  string target_profile_id = 1;
}

message AcceptFriendInvitationRequest {
  string requester_profile_id = 1;
}

message DeclineFriendInvitationRequest {
  string requester_profile_id = 1;
}

message RemoveFriendRequest {
  string friend_profile_id = 1;
}

message ListFriendsRequest {
  voice.common.v1.CursorPageRequest page = 1;
}

message FriendList {
  repeated FriendEdge friends = 1;
  string next_cursor = 2;
}

message FriendEdge {
  string profile_id = 1;
  google.protobuf.Timestamp friends_since = 2;
}

message ListFriendRequestsRequest {}

message FriendRequestList {
  repeated PendingFriendRequest incoming = 1;
  repeated PendingFriendRequest outgoing = 2;
}

message PendingFriendRequest {
  string profile_id = 1;
  google.protobuf.Timestamp created_at = 2;
}

message AddContactRequest {
  string target_profile_id = 1;
  string source = 2; // manual | phone_sync | space | matchmaking
}

message RemoveContactRequest {
  string target_profile_id = 1;
}

message ListContactsRequest {
  voice.common.v1.CursorPageRequest page = 1;
}

message ContactList {
  repeated Contact contacts = 1;
  string next_cursor = 2;
}

message Contact {
  string profile_id = 1;
  string source = 2;
  bool is_favorite = 3;
}

message SyncPhoneContactsRequest {
  repeated string hashed_phone_numbers = 1;
}

message SyncPhoneContactsResponse {
  repeated string matched_profile_ids = 1;
}

message SetFavoriteRequest {
  string friend_profile_id = 1;
  bool favorite = 2;
}

message ListFavoritesRequest {}

// Account-level block: applies to all profiles of the peer account. Body: blocked party's account UUID (auth_db.accounts.id); blocker from request context.
message BlockAccountRequest {
  string blocked_account_id = 1;
}

message UnblockAccountRequest {
  string blocked_account_id = 1;
}

message ListBlockedRequest {
  voice.common.v1.CursorPageRequest page = 1;
}

message BlockedList {
  repeated BlockedAccount blocked = 1;
  string next_cursor = 2;
}

message BlockedAccount {
  string blocked_account_id = 1;
  google.protobuf.Timestamp created_at = 2;
}

message IsBlockedRequest {
  string account_id_a = 1;
  string account_id_b = 2;
}

message IsBlockedResponse {
  bool blocked = 1;
}

message AreFriendsRequest {
  string profile_id_a = 1;
  string profile_id_b = 2;
}

message AreFriendsResponse {
  bool friends = 1;
}

message GetFriendsOfFriendsRequest {
  string profile_id = 1;
}

message ProfileIdList {
  repeated string profile_ids = 1;
}

message SendFriendInvitationResponse {}

message AcceptFriendInvitationResponse {}

message DeclineFriendInvitationResponse {}
message RemoveFriendResponse {}
message ListFriendsResponse {
  FriendList friend_list = 1;
}
message ListFriendRequestsResponse {
  FriendRequestList friend_request_list = 1;
}
message AddContactResponse {}
message RemoveContactResponse {}
message ListContactsResponse {
  ContactList contact_list = 1;
}
message SetFavoriteResponse {}
message ListFavoritesResponse {
  FriendList friend_list = 1;
}
message BlockAccountResponse {}
message UnblockAccountResponse {}
message ListBlockedResponse {
  BlockedList blocked_list = 1;
}
message GetFriendsOfFriendsResponse {
  ProfileIdList profile_id_list = 1;
}
