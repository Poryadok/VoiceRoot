syntax = "proto3";

package voice.story.v1;

import "google/protobuf/timestamp.proto";
import "voice/common/v1/common.proto";

option go_package = "voice.app/voice/story/v1;storyv1";

// Canonical values for Story.type / CreateStoryRequest.type (strings).
enum StoryMediaType {
  STORY_MEDIA_TYPE_UNSPECIFIED = 0;
  STORY_MEDIA_TYPE_PHOTO = 1;
  STORY_MEDIA_TYPE_VIDEO = 2;
  STORY_MEDIA_TYPE_TEXT = 3;
}

// Canonical values for Story.visibility / CreateStoryRequest.visibility (strings).
enum StoryAudience {
  STORY_AUDIENCE_UNSPECIFIED = 0;
  STORY_AUDIENCE_PUBLIC = 1;
  STORY_AUDIENCE_FRIENDS = 2;
  STORY_AUDIENCE_CLOSE_FRIENDS = 3;
  STORY_AUDIENCE_CUSTOM = 4;
}

// Stories and highlights. HTTP: /api/v1/stories/**.
service StoryService {
  rpc CreateStory(CreateStoryRequest) returns (CreateStoryResponse);
  rpc DeleteStory(DeleteStoryRequest) returns (DeleteStoryResponse);
  rpc GetStory(GetStoryRequest) returns (GetStoryResponse);

  rpc GetStoryFeed(GetStoryFeedRequest) returns (GetStoryFeedResponse);
  rpc GetProfileStories(GetProfileStoriesRequest) returns (GetProfileStoriesResponse);

  rpc MarkViewed(MarkViewedRequest) returns (MarkViewedResponse);
  rpc GetViewers(GetViewersRequest) returns (GetViewersResponse);

  rpc ReactToStory(ReactToStoryRequest) returns (ReactToStoryResponse);

  rpc GetArchive(GetArchiveRequest) returns (GetArchiveResponse);

  rpc CreateHighlight(CreateHighlightRequest) returns (CreateHighlightResponse);
  rpc UpdateHighlight(UpdateHighlightRequest) returns (UpdateHighlightResponse);
  rpc DeleteHighlight(DeleteHighlightRequest) returns (DeleteHighlightResponse);
  rpc AddToHighlight(AddToHighlightRequest) returns (AddToHighlightResponse);
  rpc RemoveFromHighlight(RemoveFromHighlightRequest) returns (RemoveFromHighlightResponse);
  rpc GetHighlights(GetHighlightsRequest) returns (GetHighlightsResponse);

  rpc CreateLookingForParty(CreateLookingForPartyRequest) returns (CreateLookingForPartyResponse);
}

message Story {
  string id = 1;
  string author_profile_id = 2;
  string type = 3; // photo | video | text; prefer type_enum when set
  optional string media_file_id = 4;
  optional string text_content = 5;
  optional string text_style_json = 6;
  optional string game_tag = 7;
  bool is_looking_for_party = 8;
  optional string lfp_criteria_json = 9;
  string mention_profile_ids_json = 10;
  int32 view_count = 11;
  string visibility = 12; // prefer visibility_enum when set
  google.protobuf.Timestamp expires_at = 13;
  google.protobuf.Timestamp archived_until = 14;
  google.protobuf.Timestamp created_at = 15;
  optional google.protobuf.Timestamp deleted_at = 16;
  optional StoryMediaType type_enum = 17;
  optional StoryAudience visibility_enum = 18;
}

message CreateStoryRequest {
  string type = 1; // prefer type_enum when set
  optional string media_file_id = 2;
  optional string text_content = 3;
  optional string text_style_json = 4;
  optional string game_tag = 5;
  string visibility = 6; // prefer visibility_enum when set
  optional StoryMediaType type_enum = 7;
  optional StoryAudience visibility_enum = 8;
}

message DeleteStoryRequest {
  string story_id = 1;
}

message GetStoryRequest {
  string story_id = 1;
}

message GetStoryFeedRequest {
  voice.common.v1.CursorPageRequest page = 1;
}

message GetProfileStoriesRequest {
  string profile_id = 1;
}

message StoryList {
  repeated Story stories = 1;
}

message MarkViewedRequest {
  string story_id = 1;
  bool anonymous = 2;
}

message GetViewersRequest {
  string story_id = 1;
}

message ViewerList {
  repeated string viewer_profile_ids = 1;
}

message ReactToStoryRequest {
  string story_id = 1;
  string emoji = 2;
}

message GetArchiveRequest {
  string profile_id = 1;
}

message Highlight {
  string id = 1;
  string profile_id = 2;
  string name = 3;
  repeated string story_ids = 4;
}

message CreateHighlightRequest {
  string name = 1;
}

message UpdateHighlightRequest {
  string highlight_id = 1;
  optional string name = 2;
}

message DeleteHighlightRequest {
  string highlight_id = 1;
}

message AddToHighlightRequest {
  string highlight_id = 1;
  string story_id = 2;
}

message RemoveFromHighlightRequest {
  string highlight_id = 1;
  string story_id = 2;
}

message GetHighlightsRequest {
  string profile_id = 1;
}

message HighlightList {
  repeated Highlight highlights = 1;
}

message CreateLookingForPartyRequest {
  string criteria_json = 1;
  optional string media_file_id = 2;
}

message CreateStoryResponse {
  Story story = 1;
}
message DeleteStoryResponse {}
message GetStoryResponse {
  Story story = 1;
}
message GetStoryFeedResponse {
  repeated Story stories = 1;
  string next_cursor = 2;
  optional voice.common.v1.CursorPageResponse page = 3;
}
message GetProfileStoriesResponse {
  StoryList story_list = 1;
}
message MarkViewedResponse {}
message GetViewersResponse {
  ViewerList viewer_list = 1;
}
message ReactToStoryResponse {}
message GetArchiveResponse {
  StoryList story_list = 1;
}
message CreateHighlightResponse {
  Highlight highlight = 1;
}
message UpdateHighlightResponse {
  Highlight highlight = 1;
}
message DeleteHighlightResponse {}
message AddToHighlightResponse {}
message RemoveFromHighlightResponse {}
message GetHighlightsResponse {
  HighlightList highlight_list = 1;
}
message CreateLookingForPartyResponse {
  Story story = 1;
}
