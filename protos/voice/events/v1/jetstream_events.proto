syntax = "proto3";

package voice.events.v1;

import "google/protobuf/timestamp.proto";

option go_package = "voice.app/voice/events/v1;eventsv1";

// JetStream domain payloads (NATS). Stream names match CONTRACT_MATRIX / MICROSERVICES.md.
// Publishers own schema evolution; treat unknown oneof arms as forward-compatible.

// --- user.events (Auth, User) ---

message UserStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    UserRegistered user_registered = 10;
    UserLoggedIn user_logged_in = 11;
    UserLoggedOut user_logged_out = 12;
    UserTwoFaEnabled user_2fa_enabled = 13;
    UserGuestConverted user_guest_converted = 14;
    UserAccountDeleted user_account_deleted = 15;
    UserAccountRestored user_account_restored = 16;
    ProfileCreated profile_created = 17;
    ProfileSwitched profile_switched = 18;
    SettingsChanged settings_changed = 19;
    PresenceChange presence_change = 20;
  }
}

message UserRegistered {
  string account_id = 1;
  string type = 2;
  string method = 3;
}

message UserLoggedIn {
  string account_id = 1;
  string device_info_json = 2;
  string ip = 3;
}

message UserLoggedOut {
  string account_id = 1;
  string device_info_json = 2;
}

message UserTwoFaEnabled {
  string account_id = 1;
}

message UserGuestConverted {
  string account_id = 1;
}

message UserAccountDeleted {
  string account_id = 1;
}

message UserAccountRestored {
  string account_id = 1;
}

message ProfileCreated {
  string profile_id = 1;
  string account_id = 2;
}

message ProfileSwitched {
  string profile_id = 1;
  string account_id = 2;
}

message SettingsChanged {
  string profile_id = 1;
  string changed_keys_json = 2;
}

message PresenceChange {
  string profile_id = 1;
  string status = 2;
}

// --- social.events ---

message SocialStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    FriendAdded friend_added = 10;
    FriendRemoved friend_removed = 11;
    ContactSynced contact_synced = 12;
    UserBlocked user_blocked = 13;
  }
}

message FriendAdded {
  string requester_profile_id = 1;
  string target_profile_id = 2;
}

message FriendRemoved {
  string profile_id_a = 1;
  string profile_id_b = 2;
}

message ContactSynced {
  string owner_profile_id = 1;
  int32 count = 2;
}

message UserBlocked {
  string blocker_account_id = 1;
  string blocked_account_id = 2;
}

// --- role.events ---

message RoleStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    RoleAssignmentChanged role_assignment_changed = 10;
    RoleDefinitionChanged role_definition_changed = 11;
  }
}

message RoleAssignmentChanged {
  string space_id = 1;
  string profile_id = 2;
  repeated string role_ids = 3;
}

message RoleDefinitionChanged {
  string space_id = 1;
  string role_id = 2;
}

// --- message.events (Messaging) ---

message MessageStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    MessageSent message_sent = 10;
    MessageEdited message_edited = 11;
    MessageDeleted message_deleted = 12;
    ReactionAdded reaction_added = 13;
    MessageRead message_read = 14;
    ReactionRemoved reaction_removed = 15;
    MentionAdded mention_added = 16;
    MessagePinned message_pinned = 17;
    MessageUnpinned message_unpinned = 18;
  }
}

message MessageSent {
  string message_id = 1;
  string chat_id = 2;
  string sender_profile_id = 3;
  bool has_mentions = 4;
  optional string thread_parent_id = 5;
  bool is_e2e = 6;
}

message MentionAdded {
  string message_id = 1;
  string chat_id = 2;
  string sender_profile_id = 3;
  repeated string mentioned_profile_ids = 4;
}

message MessageEdited {
  string message_id = 1;
  string chat_id = 2;
  bool is_e2e = 6;
}

message MessageDeleted {
  string message_id = 1;
  string chat_id = 2;
}

message ReactionAdded {
  string message_id = 1;
  string profile_id = 2;
  string emoji = 3;
  string chat_id = 4;
  string message_author_profile_id = 5;
}

message ReactionRemoved {
  string message_id = 1;
  string profile_id = 2;
  string emoji = 3;
  string chat_id = 4;
}

message MessageRead {
  string message_id = 1;
  string chat_id = 2;
  string profile_id = 3;
}

message MessagePinned {
  string message_id = 1;
  string chat_id = 2;
  string pinned_by = 3;
}

message MessageUnpinned {
  string message_id = 1;
  string chat_id = 2;
  string unpinned_by = 3;
}

// --- chat.events (Chat, Space) ---

message ChatStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    ChatCreated chat_created = 10;
    ChatMemberChanged chat_member_changed = 11;
    SpaceTreeChanged space_tree_changed = 12;
    SpaceCreated space_created = 13;
  }
}

message ChatCreated {
  string chat_id = 1;
  string type = 2;
}

message ChatMemberChanged {
  string chat_id = 1;
  string profile_id = 2;
  string change = 3; // joined | left
}

message SpaceTreeChanged {
  string space_id = 1;
  string node_id = 2;
  string change = 3; // upserted | removed
}

message SpaceCreated {
  string space_id = 1;
  string owner_profile_id = 2;
}

// --- voice.events ---

message VoiceStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    CallStarted call_started = 10;
    CallEnded call_ended = 11;
    ScreenShareStarted screen_share_started = 12;
    CallIncoming call_incoming = 13;
    CallAccepted call_accepted = 14;
    CallDeclined call_declined = 15;
    CallMissed call_missed = 16;
    VoiceStateChanged voice_state_changed = 17;
    ScreenShareStopped screen_share_stopped = 18;
  }
}

message CallStarted {
  string room_id = 1;
  repeated string profile_ids = 2;
  string chat_id = 3;
  string initiator_profile_id = 4;
  string callee_profile_id = 5;
  string media_kind = 6; // audio | video
  string livekit_room_name = 7;
}

message CallEnded {
  string room_id = 1;
  int32 duration_seconds = 2;
  repeated string profile_ids = 3;
  string reason = 4; // hangup | declined | missed | timeout
  string ended_by_profile_id = 5;
}

message ScreenShareStarted {
  string room_id = 1;
  string profile_id = 2;
  string stream_id = 3;
  repeated string profile_ids = 4;
}

message ScreenShareStopped {
  string room_id = 1;
  string profile_id = 2;
  string stream_id = 3;
  repeated string profile_ids = 4;
}

message CallIncoming {
  string room_id = 1;
  string chat_id = 2;
  string initiator_profile_id = 3;
  string callee_profile_id = 4;
  string media_kind = 5; // audio | video
  string livekit_room_name = 6;
  google.protobuf.Timestamp expires_at = 7;
}

message CallAccepted {
  string room_id = 1;
  string chat_id = 2;
  string accepted_by_profile_id = 3;
  repeated string profile_ids = 4;
  string media_kind = 5; // audio | video
  string livekit_room_name = 6;
}

message CallDeclined {
  string room_id = 1;
  string chat_id = 2;
  string declined_by_profile_id = 3;
  repeated string profile_ids = 4;
}

message CallMissed {
  string room_id = 1;
  string chat_id = 2;
  string initiator_profile_id = 3;
  string callee_profile_id = 4;
}

message VoiceStateChanged {
  string room_id = 1;
  string profile_id = 2;
  optional bool is_muted = 3;
  optional bool is_deafened = 4;
  optional bool is_video_on = 5;
  repeated string profile_ids = 6;
}

// --- moderation.events ---

message ModerationStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    ReportCreated report_created = 10;
    SanctionApplied sanction_applied = 11;
    AppealSubmitted appeal_submitted = 12;
  }
}

message ReportCreated {
  string report_id = 1;
  string reporter_profile_id = 2;
}

message SanctionApplied {
  string sanction_id = 1;
  string target_account_id = 2;
  string type = 3;
}

message AppealSubmitted {
  string appeal_id = 1;
  string sanction_id = 2;
}

// --- subscription.events ---

message SubscriptionStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    PlanStarted plan_started = 10;
    PlanCancelled plan_cancelled = 11;
    PaymentSuccess payment_success = 12;
    PaymentFailed payment_failed = 13;
  }
}

message PlanStarted {
  string account_id = 1;
  string plan = 2;
}

message PlanCancelled {
  string account_id = 1;
  string plan = 2;
}

message PaymentSuccess {
  string account_id = 1;
  string provider = 2;
}

message PaymentFailed {
  string account_id = 1;
  string provider = 2;
}

// --- file.events ---

message FileStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    FileUploaded file_uploaded = 10;
    FileScanResult file_scan_result = 11;
    FileExpired file_expired = 12;
  }
}

message FileUploaded {
  string file_id = 1;
  string uploader_profile_id = 2;
}

message FileScanResult {
  string file_id = 1;
  string result = 2;
}

message FileExpired {
  string file_id = 1;
  optional string chat_id = 2;
}

// --- matchmaking.events ---

message MatchmakingStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    SearchStarted search_started = 10;
    MatchFound match_found = 11;
    MatchTimeout match_timeout = 12;
    RatingSubmitted rating_submitted = 13;
    SearchCancelled search_cancelled = 14;
    MatchCompleted match_completed = 15;
    SearchNudge search_nudge = 16;
  }
}

message SearchStarted {
  string session_id = 1;
  string profile_id = 2;
  string game_id = 3;
  string mode = 4;
  string region = 5;
}

message SearchCancelled {
  string session_id = 1;
  string profile_id = 2;
}

message MatchFound {
  string match_id = 1;
  repeated string profile_ids = 2;
  string game_id = 3;
  string mode = 4;
  string region = 5;
  repeated string session_ids = 6;
  optional string chat_id = 7;
  optional string voice_room_id = 8;
}

message MatchTimeout {
  string session_id = 1;
  string profile_id = 2;
  string game_id = 3;
  string mode = 4;
}

message SearchNudge {
  string session_id = 1;
  string profile_id = 2;
  string game_id = 3;
  string mode = 4;
}

message MatchCompleted {
  string match_id = 1;
  int64 duration_seconds = 2;
  repeated string profile_ids = 3;
}

message RatingSubmitted {
  string match_id = 1;
  string rater_profile_id = 2;
  string rated_profile_id = 3;
  int32 stars = 4;
}

// --- story.events ---

message StoryStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    StoryCreated story_created = 10;
    StoryViewed story_viewed = 11;
    HighlightAdded highlight_added = 12;
    StoryReacted story_reacted = 13;
    StoryExpired story_expired = 14;
    StoryHighlightCreated story_highlight_created = 15;
    StoryLfpCreated story_lfp_created = 16;
  }
}

message StoryCreated {
  string story_id = 1;
  string author_profile_id = 2;
  string type = 3;
  optional string game_tag = 4;
  repeated string mention_profile_ids = 5;
}

message StoryViewed {
  string story_id = 1;
  string viewer_profile_id = 2;
}

message StoryReacted {
  string story_id = 1;
  string reactor_profile_id = 2;
  string emoji = 3;
}

message StoryExpired {
  string story_id = 1;
}

message StoryHighlightCreated {
  string highlight_id = 1;
  string profile_id = 2;
}

message StoryLfpCreated {
  string story_id = 1;
  string author_profile_id = 2;
  string criteria_json = 3;
}

message HighlightAdded {
  string highlight_id = 1;
  string profile_id = 2;
}

// --- federation.events ---

message FederationStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    NodeConnected node_connected = 10;
    NodeDisconnected node_disconnected = 11;
    EventSynced event_synced = 12;
    SyncFailed sync_failed = 13;
    NodeDefederated node_defederated = 14;
  }
}

message NodeConnected {
  string node_id = 1;
  string host = 2;
}

message NodeDisconnected {
  string node_id = 1;
  string reason = 2;
}

message EventSynced {
  string node_id = 1;
  string event_type = 2;
  string direction = 3;
}

message SyncFailed {
  string node_id = 1;
  string error = 2;
}

message NodeDefederated {
  string node_id = 1;
  string reason = 2;
}

// --- bot.events ---

message BotStreamEvent {
  string event_id = 1;
  google.protobuf.Timestamp occurred_at = 2;
  oneof payload {
    BotRegistered bot_registered = 10;
    CommandExecuted command_executed = 11;
    WebhookDelivered webhook_delivered = 12;
    WebhookFailed webhook_failed = 13;
  }
}

message BotRegistered {
  string bot_id = 1;
  string owner_account_id = 2;
}

message CommandExecuted {
  string bot_id = 1;
  string command = 2;
  string chat_id = 3;
}

message WebhookDelivered {
  string bot_id = 1;
  string delivery_id = 2;
  bool success = 3;
}

message WebhookFailed {
  string bot_id = 1;
  string event_type = 2;
  string error = 3;
}
