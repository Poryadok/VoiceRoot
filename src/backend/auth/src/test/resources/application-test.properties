spring.datasource.url=jdbc:h2:mem:auth_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.flyway.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
auth.persistence=memory
auth.jwt.issuer=voice-auth
auth.jwt.audience=voice-client
auth.jwt.key-id=test-key
auth.jwt.access-ttl=PT15M
auth.refresh.ttl=P30D
auth.redis.blacklist-prefix=jwt:blacklist:
auth.grpc.port=-1
auth.totp.test-bypass=true
