spring:
  datasource:
    # Tests set voice.auth.jdbc.url (avoids PropertySource ordering clashes with auth.user-db.jdbc-url).
    url: "${voice.auth.jdbc.url:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}}"
    username: ${SPRING_DATASOURCE_USERNAME:voice}
    password: ${SPRING_DATASOURCE_PASSWORD:voice}
  flyway:
    enabled: ${AUTH_FLYWAY_ENABLED:true}
    # Same JDBC URL as spring.datasource (explicit so Flyway never follows a secondary DataSource bean).
    url: "${voice.auth.jdbc.url:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}}"
    user: "${SPRING_DATASOURCE_USERNAME:voice}"
    password: "${SPRING_DATASOURCE_PASSWORD:voice}"
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

auth:
  persistence: jdbc
  user-db:
    jdbc-url: "${AUTH_USER_DB_JDBC_URL:jdbc:postgresql://localhost:5432/user_db}"
    username: "${AUTH_USER_DB_USERNAME:${SPRING_DATASOURCE_USERNAME:voice}}"
    password: "${AUTH_USER_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:voice}}"
  jwt:
    issuer: voice-auth
    audience: voice-client
    key-id: local-key
    access-ttl: PT15M
    private-key-pem: "${AUTH_JWT_PRIVATE_KEY_PEM:}"
    private-key-location: "${AUTH_JWT_PRIVATE_KEY_LOCATION:}"
  refresh:
    ttl: P30D
  redis:
    blacklist-prefix: "jwt:blacklist:"
  grpc:
    port: 9090
  oauth:
    public-api-base-url: "${AUTH_OAUTH_PUBLIC_API_BASE_URL:http://127.0.0.1:18080}"
    developer-portal:
      enabled: ${AUTH_OAUTH_DEVELOPER_PORTAL_ENABLED:true}
      client-id: "${AUTH_OAUTH_DEVELOPER_PORTAL_CLIENT_ID:}"
      client-secret: "${AUTH_OAUTH_DEVELOPER_PORTAL_CLIENT_SECRET:}"
      redirect-uris: "${AUTH_OAUTH_DEVELOPER_PORTAL_REDIRECT_URIS:}"
      authorization-code-ttl: ${AUTH_OAUTH_AUTHORIZATION_CODE_TTL:PT60S}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include:
          - prometheus
          - health
  endpoint:
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
