syntax = "proto3";

package voice.auth.v1;

import "google/protobuf/timestamp.proto";

option go_package = "voice.app/voice/auth/v1;authv1";
option java_multiple_files = true;
option java_package = "app.voice.auth.v1";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc Enable2FA(Enable2FARequest) returns (Enable2FAResponse);
  rpc Verify2FA(Verify2FARequest) returns (Verify2FAResponse);
  rpc VerifyOTP(VerifyOTPRequest) returns (VerifyOTPResponse);
  rpc ConvertGuest(ConvertGuestRequest) returns (ConvertGuestResponse);
  rpc DeleteAccount(DeleteAccountRequest) returns (DeleteAccountResponse);
  rpc RestoreAccount(RestoreAccountRequest) returns (RestoreAccountResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetJWKS(GetJWKSRequest) returns (GetJWKSResponse);
  // Phase 13: switch active profile claim in next access JWT (primary-profile-bootstrap.md).
  rpc SwitchActiveProfile(SwitchActiveProfileRequest) returns (SwitchActiveProfileResponse);
  // Phase 14: internal — platform moderation suspends account (docs/PLAN.md phase 14).
  rpc SetAccountStatus(SetAccountStatusRequest) returns (SetAccountStatusResponse);
  rpc PutE2EKeyBackup(PutE2EKeyBackupRequest) returns (PutE2EKeyBackupResponse);
  rpc GetE2EKeyBackup(GetE2EKeyBackupRequest) returns (GetE2EKeyBackupResponse);
  // Internal — Social SyncPhoneContacts: hashed phone → primary profile_id (accounts.phone).
  rpc ResolvePhoneHashes(ResolvePhoneHashesRequest) returns (ResolvePhoneHashesResponse);
}

message RegisterRequest {
  optional string email = 1;
  optional string phone = 2;
  string password = 3;
  bool guest = 4;
}

message LoginRequest {
  optional string email = 1;
  optional string phone = 2;
  string password = 3;
  optional string totp_code = 4;
  string device_info_json = 5;
}

message LogoutRequest {
  string refresh_token = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
  string device_info_json = 2;
}

message Enable2FARequest {
  string password = 1;
}

message Enable2FAResponse {
  string totp_uri = 1;
  string secret_backup_hint = 2;
  repeated string backup_codes = 3;
}

message Verify2FARequest {
  string totp_code = 1;
}

message VerifyOTPRequest {
  string code = 1;
  string otp_type = 2;
  optional OtpType otp_type_enum = 3;
}

enum OtpType {
  OTP_TYPE_UNSPECIFIED = 0;
  OTP_TYPE_EMAIL_VERIFY = 1;
  OTP_TYPE_PASSWORD_RESET = 2;
}

message ConvertGuestRequest {
  optional string email = 1;
  optional string phone = 2;
  string password = 3;
}

message DeleteAccountRequest {
  string password = 1;
}

message RestoreAccountRequest {
  string token = 1;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message AuthSession {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in_seconds = 3;
  string account_id = 4;
  string profile_id = 5;
  string account_type = 6;
}

message RegisterResponse {
  AuthSession session = 1;
}

message LoginResponse {
  AuthSession session = 1;
}

message LogoutResponse {}

message RefreshTokenResponse {
  AuthSession session = 1;
}

message Verify2FAResponse {
  AuthSession session = 1;
}

message VerifyOTPResponse {}

message ConvertGuestResponse {
  AuthSession session = 1;
}

message DeleteAccountResponse {}

message RestoreAccountResponse {
  AuthSession session = 1;
}

message ValidateTokenResponse {
  TokenClaims claims = 1;
}

message GetJWKSRequest {}

message GetJWKSResponse {
  string keys_json = 1;
}

message TokenClaims {
  string user_id = 1;
  string profile_id = 2;
  repeated string roles = 3;
  string subscription_tier = 4;
  google.protobuf.Timestamp expires_at = 5;
  string account_type = 6;
}

message SwitchActiveProfileRequest {
  string access_token = 1;
  string profile_id = 2;
  string device_info_json = 3;
}

message SwitchActiveProfileResponse {
  AuthSession session = 1;
}

message SetAccountStatusRequest {
  string account_id = 1;
  string status = 2; // active | suspended
  string reason = 3;
}

message SetAccountStatusResponse {}

message PutE2EKeyBackupRequest {
  string encrypted_blob = 1;
  optional string password_hint = 2;
}

message PutE2EKeyBackupResponse {}

message GetE2EKeyBackupRequest {}

message GetE2EKeyBackupResponse {
  string encrypted_blob = 1;
  optional string password_hint = 2;
}

message ResolvePhoneHashesRequest {
  repeated string phone_hashes = 1;
}

message PhoneHashProfileMatch {
  string phone_hash = 1;
  string profile_id = 2;
}

message ResolvePhoneHashesResponse {
  repeated PhoneHashProfileMatch matches = 1;
}
