# Image is substituted in CI (sed) before kubectl apply — see docs/DEPLOYMENT.md.
# Full phases 0–10 upstreams: voice-app-config ConfigMap + voice-app-secrets Secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-gateway
  namespace: voice-staging
  labels:
    app: voice-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voice-gateway
  template:
    metadata:
      labels:
        app: voice-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: gateway
          image: IMAGE_PLACEHOLDER
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: GATEWAY_REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: voice-app-config
                  key: REDIS_ADDR
            - name: GATEWAY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: voice-app-secrets
                  key: GATEWAY_DATABASE_URL
          envFrom:
            - configMapRef:
                name: voice-app-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: voice-gateway
  namespace: voice-staging
  labels:
    app: voice-gateway
spec:
  selector:
    app: voice-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
