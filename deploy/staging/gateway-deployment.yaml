# Image is substituted in CI (sed) before kubectl apply — see docs/DEPLOYMENT.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-gateway
  namespace: voice-staging
  labels:
    app: voice-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: voice-gateway
  template:
    metadata:
      labels:
        app: voice-gateway
    spec:
      containers:
        - name: gateway
          image: IMAGE_PLACEHOLDER
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: voice-gateway
  namespace: voice-staging
  labels:
    app: voice-gateway
spec:
  selector:
    app: voice-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
