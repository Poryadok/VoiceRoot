# Template for staging secrets. Copy to secret.yaml (gitignored), fill values, then:
#   kubectl apply -f deploy/staging/secret.yaml
#
# Required for full phases 0–10 (+ phase 16 bot):
#   POSTGRES_PASSWORD, AUTH_JWT_PRIVATE_KEY (PEM), USER_R2_*, FILE_R2_*, BOT_DATABASE_URL
# Optional push (phase 6–8):
#   FCM_PROJECT_ID, FCM_SERVICE_ACCOUNT_JSON, APNS_* (see docs/DEPLOYMENT.md)
apiVersion: v1
kind: Secret
metadata:
  name: voice-app-secrets
  namespace: voice-staging
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change-me-staging"
  SOCIAL_DATABASE_URL: "postgres://voice:change-me-staging@voice-postgres:5432/social_db?sslmode=disable"
  USER_DATABASE_URL: "postgres://voice:change-me-staging@voice-postgres:5432/user_db?sslmode=disable"
  CHAT_DATABASE_URL: "postgres://voice:change-me-staging@voice-postgres:5432/chat_db?sslmode=disable"
  SPACE_DATABASE_URL: "postgres://voice:change-me-staging@voice-postgres:5432/space_db?sslmode=disable"
  MESSAGING_DATABASE_URL: "postgres://voice:change-me-staging@voice-postgres:5432/messaging_db?sslmode=disable"
  FILE_DATABASE_URL: "postgres://voice:change-me-staging@voice-postgres:5432/file_db?sslmode=disable"
  ROLE_DATABASE_URL: "postgres://voice:change-me-staging@voice-postgres:5432/role_db?sslmode=disable"
  MATCHMAKING_DATABASE_URL: "postgres://voice:change-me-staging@voice-postgres:5432/matchmaking_db?sslmode=disable"
  SEARCH_DATABASE_URL: "postgres://voice:change-me-staging@voice-postgres:5432/search_db?sslmode=disable"
  NOTIFICATION_DATABASE_URL: "postgres://voice:change-me-staging@voice-postgres:5432/notification_db?sslmode=disable"
  BOT_DATABASE_URL: "postgres://voice:change-me-staging@voice-postgres:5432/bot_db?sslmode=disable"
  GATEWAY_DATABASE_URL: "postgres://voice:change-me-staging@voice-postgres:5432/gateway_db?sslmode=disable"
  # Mount auth JWT private key as file via secret volume in auth deployment.
  AUTH_JWT_PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_PKCS8_PEM
    -----END PRIVATE KEY-----
  USER_R2_ENDPOINT: "https://YOUR_ACCOUNT.r2.cloudflarestorage.com"
  USER_R2_ACCESS_KEY_ID: ""
  USER_R2_SECRET_ACCESS_KEY: ""
  USER_R2_BUCKET: "voice-staging-avatars"
  USER_R2_PUBLIC_BASE_URL: "https://pub.example/avatars"
  FILE_R2_ENDPOINT: "https://YOUR_ACCOUNT.r2.cloudflarestorage.com"
  FILE_R2_ACCESS_KEY_ID: ""
  FILE_R2_SECRET_ACCESS_KEY: ""
  FILE_R2_BUCKET: "voice-staging-files"
  FCM_PROJECT_ID: ""
  FCM_SERVICE_ACCOUNT_JSON: ""
  APNS_KEY_ID: ""
  APNS_TEAM_ID: ""
  APNS_PRIVATE_KEY: ""
  APNS_BUNDLE_ID: "voice.app"
  APNS_VOIP_TOPIC: "voice.app.voip"
  APNS_PRODUCTION: "false"
