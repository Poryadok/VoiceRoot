# Flutter web SPA client. Build image with VOICE_API_BASE_URL and VOICE_LIVEKIT_URL
# matching staging gateway / LiveKit endpoints — see docs/DEPLOYMENT.md.
# Substitute __IMAGE_REGISTRY__ / __IMAGE_TAG__ / __WEB_INGRESS_HOST__ before apply.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-web
  namespace: voice-staging
  labels: {app: voice-web}
spec:
  replicas: 1
  selector:
    matchLabels: {app: voice-web}
  template:
    metadata:
      labels: {app: voice-web}
    spec:
      containers:
        - name: web
          image: __IMAGE_REGISTRY__/web:__IMAGE_TAG__
          ports: [{containerPort: 80, name: http}]
          readinessProbe: {httpGet: {path: /health, port: http}, periodSeconds: 5}
          livenessProbe: {httpGet: {path: /health, port: http}, periodSeconds: 15}
---
apiVersion: v1
kind: Service
metadata:
  name: voice-web
  namespace: voice-staging
spec:
  selector: {app: voice-web}
  ports: [{name: http, port: 80, targetPort: http}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voice-web-http
  namespace: voice-staging
  labels:
    app.kubernetes.io/name: voice-web
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: __WEB_INGRESS_HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: voice-web
                port:
                  number: 80
