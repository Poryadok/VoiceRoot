# Voice application services (full app stack). Image placeholders substituted by render-and-apply.sh.
# Services: auth, social, user, chat, messaging, file, matchmaking, search, notification, realtime, space, role, voice, gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-auth
  namespace: voice-staging
  labels: {app: voice-auth}
spec:
  replicas: 1
  selector:
    matchLabels: {app: voice-auth}
  template:
    metadata:
      labels: {app: voice-auth}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: auth
          image: __IMAGE_REGISTRY__/auth:__IMAGE_TAG__
          ports: [{containerPort: 8080, name: http}, {containerPort: 9090, name: grpc}]
          env:
            - {name: SPRING_DATASOURCE_URL, value: "jdbc:postgresql://voice-postgres:5432/auth_db"}
            - {name: SPRING_DATASOURCE_USERNAME, valueFrom: {configMapKeyRef: {name: voice-app-config, key: POSTGRES_USER}}}
            - {name: SPRING_DATASOURCE_PASSWORD, valueFrom: {secretKeyRef: {name: voice-app-secrets, key: POSTGRES_PASSWORD}}}
            - {name: AUTH_USER_DB_JDBC_URL, value: "jdbc:postgresql://voice-postgres:5432/user_db"}
            - {name: AUTH_USER_DB_USERNAME, valueFrom: {configMapKeyRef: {name: voice-app-config, key: POSTGRES_USER}}}
            - {name: AUTH_USER_DB_PASSWORD, valueFrom: {secretKeyRef: {name: voice-app-secrets, key: POSTGRES_PASSWORD}}}
            - {name: SPRING_DATA_REDIS_HOST, value: voice-redis}
            - {name: SPRING_DATA_REDIS_PORT, value: "6379"}
            - {name: AUTH_JWT_PRIVATE_KEY_LOCATION, value: "file:/run/jwt.pem"}
            - {name: AUTH_OAUTH_PUBLIC_API_BASE_URL, valueFrom: {configMapKeyRef: {name: voice-app-config, key: AUTH_OAUTH_PUBLIC_API_BASE_URL}}}
            - {name: AUTH_OAUTH_DEVELOPER_PORTAL_ENABLED, valueFrom: {configMapKeyRef: {name: voice-app-config, key: AUTH_OAUTH_DEVELOPER_PORTAL_ENABLED}}}
            - {name: AUTH_OAUTH_DEVELOPER_PORTAL_CLIENT_ID, valueFrom: {configMapKeyRef: {name: voice-app-config, key: AUTH_OAUTH_DEVELOPER_PORTAL_CLIENT_ID}}}
            - {name: AUTH_OAUTH_DEVELOPER_PORTAL_REDIRECT_URIS, valueFrom: {configMapKeyRef: {name: voice-app-config, key: AUTH_OAUTH_DEVELOPER_PORTAL_REDIRECT_URIS}}}
          volumeMounts:
            - {name: jwt-key, mountPath: /run/jwt.pem, subPath: jwt.pem, readOnly: true}
          readinessProbe: {httpGet: {path: /health, port: http}, initialDelaySeconds: 30, periodSeconds: 5}
      volumes:
        - name: jwt-key
          secret: {secretName: voice-app-secrets, items: [{key: AUTH_JWT_PRIVATE_KEY, path: jwt.pem}]}
---
apiVersion: v1
kind: Service
metadata:
  name: voice-auth
  namespace: voice-staging
spec:
  selector: {app: voice-auth}
  ports: [{name: http, port: 8080}, {name: grpc, port: 9090}]
