# Developer Portal static site ([bots.md](../../docs/features/bots.md)). Build image with VITE_VOICE_API_BASE + VITE_OAUTH_CLIENT_ID
# matching voice-auth OAuth env — see docs/DEPLOYMENT.md.
# Substitute __IMAGE_REGISTRY__ / __IMAGE_TAG__ / __DEVELOPER_PORTAL_INGRESS_HOST__ before apply.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-developer-portal
  namespace: voice-prod
  labels: {app: voice-developer-portal}
spec:
  replicas: 1
  selector:
    matchLabels: {app: voice-developer-portal}
  template:
    metadata:
      labels: {app: voice-developer-portal}
    spec:
      containers:
        - name: portal
          image: __IMAGE_REGISTRY__/developer-portal:__IMAGE_TAG__
          ports: [{containerPort: 80, name: http}]
          readinessProbe: {httpGet: {path: /, port: http}, periodSeconds: 5}
          livenessProbe: {httpGet: {path: /, port: http}, periodSeconds: 15}
---
apiVersion: v1
kind: Service
metadata:
  name: voice-developer-portal
  namespace: voice-prod
spec:
  selector: {app: voice-developer-portal}
  ports: [{name: http, port: 80, targetPort: http}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voice-developer-portal-http
  namespace: voice-prod
  labels:
    app.kubernetes.io/name: voice-developer-portal
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: __DEVELOPER_PORTAL_INGRESS_HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: voice-developer-portal
                port:
                  number: 80
