# Promtail for docker compose: discovers containers via Docker API (no host log paths).
# Works on Linux and Docker Desktop (Windows/macOS) with a mounted docker.sock.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-voice-compose
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only containers started by docker compose (any project name).
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: .+
        action: keep
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      - target_label: namespace
        replacement: voice-local
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            service: service
            event: event
            request_id: request_id
      - labels:
          level:
          service:
          event:
