# Postgres metrics for Prometheus (pg_up, pg_stat_*).
# Deployed in voice-staging to reuse voice-app-config / voice-app-secrets.
# Scraped by Prometheus in voice-observability (static job in infra-exporters.yaml).
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: voice-staging
  labels:
    app: postgres-exporter
spec:
  selector:
    app: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: 9187
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: voice-staging
  labels:
    app: postgres-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - containerPort: 9187
              name: metrics
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: voice-app-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: voice-app-secrets
                  key: POSTGRES_PASSWORD
            - name: DATA_SOURCE_NAME
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@voice-postgres:5432/voice?sslmode=disable"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
