# PrometheusRule CRs for kube-prometheus-stack (OBSERVABILITY_PROFILE=full only).
# Rules mirror deploy/observability/prometheus/rules/*.yaml used by k3s-lite ConfigMap.
#
# Apply after Helm install (label must match values-kube-prometheus.yaml ruleSelector):
#   kubectl apply -f deploy/observability/profiles/full/prometheus-rules.yaml
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: voice-recording-rules
  namespace: voice-observability
  labels:
    voice.dev/prometheus-rules: "true"
spec:
  groups:
    - name: voice_slo_recording
      interval: 30s
      rules:
        - record: slo:gateway:availability:5m
          expr: |
            sum by (route_group) (rate(gateway_http_requests_total{status=~"2.."}[5m]))
            /
            sum by (route_group) (rate(gateway_http_requests_total[5m]))
          labels:
            cluster: voice-staging

        - record: slo:gateway:latency:p95:5m
          expr: |
            histogram_quantile(
              0.95,
              sum by (route_group, le) (rate(gateway_http_request_duration_seconds_bucket[5m]))
            )
          labels:
            cluster: voice-staging

        - record: slo:gateway:5xx_rate:5m
          expr: |
            sum by (route_group) (rate(gateway_http_requests_total{status=~"5.."}[5m]))
            /
            sum by (route_group) (rate(gateway_http_requests_total[5m]))
          labels:
            cluster: voice-staging

    - name: voice_infra_recording
      interval: 30s
      rules:
        - record: nats_up
          expr: up{job="voice-nats-exporter"}
          labels:
            cluster: voice-staging

        - record: nats_jetstream_stream_messages_pending
          expr: |
            label_replace(
              sum by (stream_name) (nats_jetstream_consumer_num_pending),
              "stream", "$1", "stream_name", "(.*)"
            )
          labels:
            cluster: voice-staging
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: voice-alerts-p1
  namespace: voice-observability
  labels:
    voice.dev/prometheus-rules: "true"
spec:
  groups:
    - name: voice_alerts_p1
      rules:
        - alert: GatewayDown
          expr: up{namespace="voice-staging", pod=~"voice-gateway.*"} == 0
          for: 2m
          labels:
            severity: critical
            cluster: voice-staging
          annotations:
            summary: Gateway pod is not scrapeable
            description: voice-gateway metrics target is down for more than 2 minutes.
            runbook_url: https://github.com/voiceroot/Voice/blob/master/docs/OPERATIONS.md

        - alert: Tier0High5xx
          expr: |
            slo:gateway:5xx_rate:5m{route_group=~"auth|messages|chats|ws"} > 0.05
          for: 5m
          labels:
            severity: critical
            cluster: voice-staging
          annotations:
            summary: High 5xx rate on Tier-0 route {{ $labels.route_group }}
            description: 5xx rate above 5% for 5m on route_group {{ $labels.route_group }}.

        - alert: RedisDown
          expr: redis_up == 0
          for: 1m
          labels:
            severity: critical
            cluster: voice-staging
          annotations:
            summary: Redis exporter reports down
            description: redis_up == 0 for 1m. Rate limit, blacklist, and WS fan-out may degrade.

        - alert: NATSDown
          expr: nats_up == 0
          for: 1m
          labels:
            severity: critical
            cluster: voice-staging
          annotations:
            summary: NATS is not reachable
            description: NATS metrics target down for 1m. Live message delivery degraded.

        - alert: PostgresDown
          expr: pg_up == 0
          for: 1m
          labels:
            severity: critical
            cluster: voice-staging
          annotations:
            summary: Postgres primary is down
            description: pg_up == 0 for 1m. Full application unavailability likely.

        - alert: PodCrashLooping
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 0m
          labels:
            severity: critical
            cluster: voice-staging
          annotations:
            summary: Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping
            description: More than 3 restarts in 15 minutes.
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: voice-alerts-p2
  namespace: voice-observability
  labels:
    voice.dev/prometheus-rules: "true"
spec:
  groups:
    - name: voice_alerts_p2
      rules:
        - alert: GatewayLatencyHigh
          expr: |
            (
              slo:gateway:latency:p95:5m{route_group="auth"} > 1.2
            )
            or
            (
              slo:gateway:latency:p95:5m{route_group="messages"} > 0.6
            )
            or
            (
              slo:gateway:latency:p95:5m{route_group="chats"} > 0.9
            )
            or
            (
              slo:gateway:latency:p95:5m{route_group="ws"} > 0.75
            )
          for: 15m
          labels:
            severity: warning
            cluster: voice-staging
          annotations:
            summary: Gateway p95 latency above SLO×1.5 on {{ $labels.route_group }}
            description: route_group {{ $labels.route_group }} p95 exceeded threshold for 15m.

        - alert: JetStreamLag
          expr: nats_jetstream_stream_messages_pending > 1000
          for: 10m
          labels:
            severity: warning
            cluster: voice-staging
          annotations:
            summary: JetStream pending messages high on {{ $labels.stream }}
            description: Stream {{ $labels.stream }} has >1000 pending messages for 10m.

        - alert: DiskSpaceLow
          expr: |
            (
              kubelet_volume_stats_available_bytes{namespace="voice-staging", persistentvolumeclaim=~".*postgres.*"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="voice-staging", persistentvolumeclaim=~".*postgres.*"}
            ) < 0.15
            or
            (
              kubelet_volume_stats_available_bytes{namespace="voice-observability", persistentvolumeclaim=~".*loki.*"}
              /
              kubelet_volume_stats_capacity_bytes{namespace="voice-observability", persistentvolumeclaim=~".*loki.*"}
            ) < 0.15
          for: 15m
          labels:
            severity: warning
            cluster: voice-staging
          annotations:
            summary: PVC disk space below 15%
            description: Postgres or Loki PVC has less than 15% free space.

        - alert: RateLimitSpike
          expr: |
            sum(rate(gateway_ratelimit_hits_total[5m])) > 10
          for: 10m
          labels:
            severity: warning
            cluster: voice-staging
          annotations:
            summary: Elevated gateway rate-limit hits
            description: gateway_ratelimit_hits_total rate above 10/s for 10m — possible abuse or misconfig.
