# ServiceMonitors for kube-prometheus-stack (OBSERVABILITY_PROFILE=full only).
# Do NOT apply alongside k3s-lite — k3s-lite uses prometheus.io/scrape pod annotations.
#
# Apply after Helm install:
#   kubectl apply -f deploy/observability/profiles/full/service-monitors.yaml
#
# Requires named Service port "http" on each voice-staging Service (see deploy/staging/services.yaml).
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: voice-gateway
  namespace: voice-staging
  labels:
    app: voice-gateway
spec:
  selector:
    matchLabels:
      app: voice-gateway
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
