# Copy to alertmanager-notifications.yaml, fill values, apply to voice-observability.
# Without this Secret, Alertmanager routes to the null receiver (alerts fire, no delivery).
#
#   kubectl apply -f deploy/observability/alertmanager/alertmanager-notifications.yaml
#   NOTIFICATIONS_ENABLED=true scripts/staging/apply-observability.sh
#
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-notifications
  namespace: voice-observability
type: Opaque
stringData:
  # Telegram: create bot via @BotFather; chat_id from @userinfobot or getUpdates
  telegram_bot_token: "REPLACE_ME"
  telegram_chat_id: "REPLACE_ME"
  # Email (SMTP)
  email_to: "oncall@example.com"
  smtp_username: "smtp-user@example.com"
  smtp_password: "REPLACE_ME"
