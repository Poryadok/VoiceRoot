# Alertmanager config when alertmanager-notifications Secret is applied.
# Requires Secret keys: telegram_bot_token, telegram_chat_id, email_to, smtp_username, smtp_password
global:
  resolve_timeout: 5m

route:
  receiver: notifications
  group_by: ['alertname', 'namespace', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = critical
      receiver: notifications
    - matchers:
        - severity = warning
      receiver: notifications

receivers:
  - name: notifications
    telegram_configs:
      - bot_token_file: /etc/alertmanager/secrets/telegram_bot_token
        chat_id_file: /etc/alertmanager/secrets/telegram_chat_id
        parse_mode: HTML
        message: '{{ template "voice.telegram" . }}'
    email_configs:
      - to_file: /etc/alertmanager/secrets/email_to
        from: alertmanager@voice.local
        smarthost: smtp.example.com:587
        auth_username_file: /etc/alertmanager/secrets/smtp_username
        auth_password_file: /etc/alertmanager/secrets/smtp_password
        headers:
          Subject: '[Voice {{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'

templates:
  - /etc/alertmanager/templates/*.tmpl

inhibit_rules:
  - source_matchers:
      - alertname = PostgresDown
    target_matchers:
      - alertname =~ "Tier0High5xx|GatewayLatencyHigh|PodCrashLooping|JetStreamLag|RedisDown|NATSDown|GatewayDown"
    equal: ['cluster']
