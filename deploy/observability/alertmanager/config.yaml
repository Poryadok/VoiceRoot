# Base Alertmanager config — safe without notification secrets (null receiver).
# When alertmanager-notifications Secret exists, apply-observability.sh switches to
# config-notifications.yaml (Telegram + email).
global:
  resolve_timeout: 5m

route:
  receiver: "null"
  group_by: ['alertname', 'namespace', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: "null"

inhibit_rules:
  - source_matchers:
      - alertname = PostgresDown
    target_matchers:
      - alertname =~ "Tier0High5xx|GatewayLatencyHigh|PodCrashLooping|JetStreamLag|RedisDown|NATSDown|GatewayDown"
    equal: ['cluster']
