# One-shot golang-migrate Job for moderation_db.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: voice-migrate-moderation-db
  namespace: __K_NAMESPACE__
  labels:
    app.kubernetes.io/name: voice-migrate-moderation-db
    app.kubernetes.io/component: migration
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 2
  activeDeadlineSeconds: 180
  template:
    metadata:
      labels:
        app.kubernetes.io/name: voice-migrate-moderation-db
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: migrate/migrate:__MIGRATE_IMAGE_TAG__
          args:
            - -path=/migrations
            - -database=__DATABASE_URL__
            - up
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations
          configMap:
            name: voice-moderation-db-migrations
            optional: false
