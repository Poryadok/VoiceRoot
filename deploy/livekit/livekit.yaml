# Local compose: browsers on the host must reach RTC via published ports (7881/tcp, 7882/udp).
# Without node_ip, LiveKit advertises the container bridge IP (e.g. 172.18.0.x) and WebRTC ICE fails.
port: 7880

rtc:
  tcp_port: 7881
  port_range_start: 7882
  port_range_end: 7882
  use_external_ip: false
  node_ip: 127.0.0.1

keys:
  devkey: secret

logging:
  level: info
