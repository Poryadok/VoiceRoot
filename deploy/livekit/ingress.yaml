# LiveKit signaling (WebSocket) via Traefik HTTP entrypoint.
# RTC TCP/UDP (7881/7882) are exposed via NodePort on voice-livekit Service — see deploy/staging/infra.yaml.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voice-livekit-http
  namespace: __K_NAMESPACE__
  labels:
    app.kubernetes.io/name: voice-livekit
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: __INGRESS_HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: voice-livekit
                port:
                  number: 7880
