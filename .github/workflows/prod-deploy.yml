name: Production deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (git SHA or semver release tag; required)"
        required: true
      deploy_mode:
        description: full | app-only | images-only
        required: false
        default: full

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.image_tag }}

      - name: Resolve image tag
        id: tag
        run: |
          set -eux
          TAG="${{ inputs.image_tag }}"
          if [ -z "${TAG}" ]; then
            echo "image_tag is required (no default latest on production)." >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - uses: azure/setup-kubectl@v5

      - name: Configure kubeconfig
        run: |
          set -eux
          mkdir -p ~/.kube
          echo "${{ secrets.PROD_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify production images in GHCR
        id: verify_image
        run: |
          set -eux
          REGISTRY="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          export VOICE_IMAGE_REGISTRY="${REGISTRY}"
          export VOICE_IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          bash scripts/prod/verify-prod-images.sh

      - name: Apply production manifests
        env:
          PROD_APP_SECRETS_YAML_B64: ${{ secrets.PROD_APP_SECRETS_YAML }}
          PROD_STAFF_TOKEN: ${{ secrets.PROD_STAFF_TOKEN }}
          VOICE_DEVELOPER_PORTAL_INGRESS_HOST: ${{ vars.VOICE_PROD_DEVELOPER_PORTAL_INGRESS_HOST }}
          VOICE_GATEWAY_INGRESS_HOST: ${{ vars.VOICE_PROD_GATEWAY_INGRESS_HOST }}
          VOICE_WEB_INGRESS_HOST: ${{ vars.VOICE_PROD_WEB_INGRESS_HOST }}
          VOICE_ADMIN_INGRESS_HOST: ${{ vars.VOICE_PROD_ADMIN_INGRESS_HOST }}
          VOICE_LIVEKIT_INGRESS_HOST: ${{ vars.VOICE_PROD_LIVEKIT_INGRESS_HOST }}
          VOICE_GATEWAY_TLS_SECRET: ${{ vars.VOICE_PROD_GATEWAY_TLS_SECRET }}
          VOICE_K8S_NAMESPACE: ${{ vars.VOICE_PROD_K8S_NAMESPACE }}
          VOICE_IMAGE_PULL_SECRET: ${{ vars.VOICE_PROD_IMAGE_PULL_SECRET }}
          VOICE_APPLY_OBSERVABILITY: ${{ vars.VOICE_PROD_APPLY_OBSERVABILITY }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          NOTIFICATIONS_ENABLED: ${{ vars.PROD_ALERTMANAGER_NOTIFICATIONS_ENABLED }}
          DEPLOY_MODE: ${{ inputs.deploy_mode }}
        run: |
          set -eux
          source scripts/prod/load-prod-domains.sh
          REGISTRY="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          TAG="${{ steps.verify_image.outputs.deploy_tag }}"
          if [ -z "${TAG}" ]; then
            TAG="${{ steps.tag.outputs.tag }}"
          fi
          export VOICE_IMAGE_REGISTRY="${REGISTRY}"
          export VOICE_IMAGE_TAG="${TAG}"
          export VOICE_K8S_NAMESPACE="${{ vars.VOICE_PROD_K8S_NAMESPACE }}"
          bash scripts/prod/render-and-apply-prod.sh
