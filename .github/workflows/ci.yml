name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  protobuf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base ref for buf breaking
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags origin ${{ github.base_ref }}:${{ github.base_ref }}
      - uses: bufbuild/buf-setup-action@v1
      - name: Buf lint
        run: buf lint
      - name: Buf format (check)
        run: buf format -d --exit-code
      - name: Buf breaking (PR vs base)
        if: github.event_name == 'pull_request'
        run: buf breaking protos --against ".git#branch=${{ github.base_ref }},subdir=protos"

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose file
        run: docker compose config --quiet

  gateway-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Go test (gateway)
        working-directory: src/backend/gateway
        run: go test ./...
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image base (lowercase)
        id: image
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend/gateway
          file: ./src/backend/gateway/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: |
            ${{ steps.image.outputs.base }}/gateway:${{ github.sha }}
            ${{ steps.image.outputs.base }}/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
