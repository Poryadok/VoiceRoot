name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      profile:
        description: >-
          auto = path-filtered tier 1 (PR/push) or tier 2 on master push;
          tier3-only = nightly parity (make build-all + integration);
          full = all tiers, all services
        type: choice
        options:
          - auto
          - tier3-only
          - full
        default: auto

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.26"
  FLUTTER_VERSION: "3.41.7"
  BUF_VERSION: v1.50.0
  GOLANGCI_LINT_MOD: github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.6.1

jobs:
  # --- Path detection (tier 1 / 2); skipped on nightly schedule and tier3-only dispatch ---
  changes:
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.profile != 'tier3-only')
    runs-on: ubuntu-latest
    outputs:
      global: ${{ steps.filter.outputs.global }}
      protos: ${{ steps.filter.outputs.protos }}
      pkg: ${{ steps.filter.outputs.pkg }}
      frontend: ${{ steps.filter.outputs.frontend }}
      auth: ${{ steps.filter.outputs.auth }}
      developer-portal: ${{ steps.filter.outputs.developer-portal }}
      compose: ${{ steps.filter.outputs.compose }}
      code: ${{ steps.filter.outputs.code }}
      go_services: ${{ steps.gomatrix.outputs.go_services }}
      run_pkg: ${{ steps.gomatrix.outputs.run_pkg }}
      run_go: ${{ steps.gomatrix.outputs.run_go }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: .github/ci/path-filters.yml
      - name: Resolve Go service matrix
        id: gomatrix
        env:
          FILTER_JSON: ${{ toJson(steps.filter.outputs) }}
          FORCE_FULL: ${{ github.event_name == 'workflow_dispatch' && inputs.profile == 'full' }}
        run: bash scripts/ci/resolve-go-matrix.sh

  ci-skip-gate:
    needs: changes
    if: >-
      github.event_name == 'pull_request' &&
      needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only or non-code change; tier-1 CI skipped (see docs-link-check for docs)."

  # --- Tier 1: fast, path-filtered (PR + push) ---
  protobuf:
    needs: changes
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.code == 'true' &&
      (needs.changes.outputs.protos == 'true' ||
       needs.changes.outputs.global == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install buf CLI
        run: |
          go install github.com/bufbuild/buf/cmd/buf@${{ env.BUF_VERSION }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Fetch base ref for buf breaking
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags origin ${{ github.base_ref }}:${{ github.base_ref }}
      - name: Buf lint
        run: buf lint
      - name: Buf format (check)
        run: buf format -d --exit-code
      - name: Buf breaking (PR vs base)
        if: github.event_name == 'pull_request'
        run: buf breaking protos --against ".git#branch=${{ github.base_ref }},subdir=protos"

  compose-config:
    needs: changes
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.code == 'true' &&
      (needs.changes.outputs.compose == 'true' ||
       needs.changes.outputs.global == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose file
        run: docker compose config --quiet
      - name: Require NATS JetStream service in compose
        run: bash scripts/ci/compose-nats-jetstream-check.sh

  flutter:
    needs: changes
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.code == 'true' &&
      (needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.protos == 'true' ||
       needs.changes.outputs.global == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install buf CLI
        run: |
          go install github.com/bufbuild/buf/cmd/buf@${{ env.BUF_VERSION }}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install protoc_plugin
        run: |
          dart pub global activate protoc_plugin
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
      - name: Check Dart protobuf codegen
        run: make buf-dart-check
      - name: Prefetch sqlite3mc native assets (host)
        run: bash scripts/ci/flutter-linux-prefetch-sqlite3.sh host
      - name: Flutter analyze and test
        working-directory: src/frontend
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos
          flutter test

  golangci:
    needs: changes
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install golangci-lint
        run: go install ${{ env.GOLANGCI_LINT_MOD }}
      - name: Add GOBIN to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Go mod tidy (affected modules)
        run: |
          set -e
          mapfile -t modules < <(echo '${{ needs.changes.outputs.go_services }}' | jq -r '.[]')
          modules=("pkg" "${modules[@]}")
          declare -A seen=()
          for m in "${modules[@]}"; do
            [[ -n "${m}" && -z "${seen[$m]:-}" ]] || continue
            seen[$m]=1
            echo "== tidy ${m} =="
            (cd "src/backend/${m}" && go mod tidy)
          done
      - name: Lint affected Go modules
        run: |
          set -e
          mapfile -t modules < <(echo '${{ needs.changes.outputs.go_services }}' | jq -r '.[]')
          modules=("pkg" "${modules[@]}")
          declare -A seen=()
          for m in "${modules[@]}"; do
            [[ -n "${m}" && -z "${seen[$m]:-}" ]] || continue
            seen[$m]=1
            echo "== ${m} =="
            (cd "src/backend/${m}" && golangci-lint run ./...)
          done

  backend-go-pkg:
    needs: changes
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.run_pkg == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Go mod tidy (pkg)
        working-directory: src/backend/pkg
        run: go mod tidy
      - name: Go test shared pkg
        working-directory: src/backend/pkg
        run: go test ./...

  backend-go:
    needs: [changes, backend-go-pkg]
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.backend-go-pkg.result != 'failure' &&
      needs.backend-go-pkg.result != 'cancelled' &&
      needs.changes.outputs.run_go == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.go_services) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Go mod tidy (${{ matrix.service }})
        working-directory: src/backend/${{ matrix.service }}
        run: go mod tidy
      - name: Go test (${{ matrix.service }})
        working-directory: src/backend/${{ matrix.service }}
        env:
          CGO_ENABLED: "0"
        run: go test -short ./...
      - name: Gateway race detector
        if: matrix.service == 'gateway'
        working-directory: src/backend/gateway
        run: CGO_ENABLED=1 go test -race ./...
      - name: Docker build context and Dockerfile
        id: dockerctx
        shell: bash
        run: |
          S="${{ matrix.service }}"
          if grep -qx "$S" scripts/ci/backend-docker-context.txt; then
            echo "context=./src/backend" >> "$GITHUB_OUTPUT"
          else
            echo "context=./src/backend/$S" >> "$GITHUB_OUTPUT"
          fi
          echo "file=./src/backend/$S/Dockerfile" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image base (lowercase)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: image
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build ${{ matrix.service }} image (PR verify)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.dockerctx.outputs.context }}
          file: ${{ steps.dockerctx.outputs.file }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push ${{ matrix.service }} image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.dockerctx.outputs.context }}
          file: ${{ steps.dockerctx.outputs.file }}
          push: true
          tags: |
            ${{ steps.image.outputs.base }}/${{ matrix.service }}:${{ github.sha }}
            ${{ steps.image.outputs.base }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backend-auth:
    needs: changes
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.code == 'true' &&
      (needs.changes.outputs.auth == 'true' ||
       needs.changes.outputs.global == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - name: Maven test (auth)
        working-directory: src/backend/auth
        run: mvn -B test
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image base (lowercase)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: image
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build auth image (PR verify)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend/auth
          file: ./src/backend/auth/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build auth image (load)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend/auth
          file: ./src/backend/auth/Dockerfile
          push: false
          load: true
          tags: voice-auth:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Auth container smoke
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: bash scripts/ci/auth-container-smoke.sh "$GITHUB_WORKSPACE"
      - name: Push auth image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          docker tag voice-auth:ci "${{ steps.image.outputs.base }}/auth:${{ github.sha }}"
          docker tag voice-auth:ci "${{ steps.image.outputs.base }}/auth:latest"
          docker push "${{ steps.image.outputs.base }}/auth:${{ github.sha }}"
          docker push "${{ steps.image.outputs.base }}/auth:latest"

  developer-portal:
    needs: changes
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      needs.changes.outputs.code == 'true' &&
      (needs.changes.outputs.developer-portal == 'true' ||
       needs.changes.outputs.global == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Resolve VITE_VOICE_API_BASE
        id: vite
        shell: bash
        run: |
          HOST="${{ vars.VOICE_GATEWAY_INGRESS_HOST }}"
          if [ -z "${HOST}" ]; then
            # shellcheck disable=SC1091
            source deploy/staging/domains.defaults
            HOST="${VOICE_GATEWAY_INGRESS_HOST}"
          fi
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/master" ]; then
            if [ -z "${HOST}" ]; then
              echo "VOICE_GATEWAY_INGRESS_HOST must be set (or deploy/staging/domains.defaults) for developer-portal image push on master." >&2
              exit 1
            fi
            echo "api_base=https://${HOST}" >> "$GITHUB_OUTPUT"
          else
            echo "api_base=http://127.0.0.1:18080" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/developer-portal/package-lock.json
      - name: npm ci, test, build
        working-directory: src/developer-portal
        env:
          VITE_VOICE_API_BASE: ${{ steps.vite.outputs.api_base }}
          VITE_OAUTH_CLIENT_ID: voice-developer-portal
          VITE_OAUTH_DISABLED: "false"
        run: |
          npm ci
          npm test
          npm run build
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image base (lowercase)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: image
        run: echo "base=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - name: Build developer-portal image (PR verify)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./src/developer-portal
          file: ./src/developer-portal/Dockerfile
          push: false
          build-args: |
            VITE_VOICE_API_BASE=${{ steps.vite.outputs.api_base }}
            VITE_OAUTH_CLIENT_ID=voice-developer-portal
            VITE_OAUTH_DISABLED=false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push developer-portal image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v6
        with:
          context: ./src/developer-portal
          file: ./src/developer-portal/Dockerfile
          push: true
          build-args: |
            VITE_VOICE_API_BASE=${{ steps.vite.outputs.api_base }}
            VITE_OAUTH_CLIENT_ID=voice-developer-portal
            VITE_OAUTH_DISABLED=false
          tags: |
            ${{ steps.image.outputs.base }}/developer-portal:${{ github.sha }}
            ${{ steps.image.outputs.base }}/developer-portal:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Tier 2: platform smoke + compose E2E (push master, or workflow_dispatch full) ---
  flutter-android-smoke:
    needs: changes
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      (github.event_name == 'push' && github.ref == 'refs/heads/master' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full')) &&
      needs.changes.outputs.code == 'true' &&
      (needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.protos == 'true' ||
       needs.changes.outputs.global == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Prefetch sqlite3mc native assets
        run: bash scripts/ci/flutter-linux-prefetch-sqlite3.sh host android
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Flutter Android release APK smoke
        working-directory: src/frontend
        run: |
          flutter pub get
          flutter build apk --release --dart-define=VOICE_API_BASE_URL=http://127.0.0.1:18080

  flutter-web-integration:
    needs: changes
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      (github.event_name == 'push' && github.ref == 'refs/heads/master' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full')) &&
      needs.changes.outputs.code == 'true' &&
      (needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.global == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Prefetch sqlite3mc native assets
        run: bash scripts/ci/flutter-linux-prefetch-sqlite3.sh host
      - name: Chrome deep link web tests
        working-directory: src/frontend
        run: |
          flutter pub get
          flutter test test/deeplink_web_chrome_test.dart -d chrome \
            --dart-define=VOICE_API_BASE_URL=http://127.0.0.1:18080

  flutter-ios:
    needs: changes
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      (github.event_name == 'push' && github.ref == 'refs/heads/master' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full')) &&
      needs.changes.outputs.code == 'true' &&
      (needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.global == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Prefetch sqlite3mc native assets
        run: bash scripts/ci/flutter-linux-prefetch-sqlite3.sh host ios-sim
      - name: Flutter iOS simulator debug smoke (no codesign)
        working-directory: src/frontend
        run: |
          bash ../../scripts/ci/patch-livekit-webrtc-podspec.sh ../..
          flutter build ios --simulator --debug --no-codesign --dart-define=VOICE_API_BASE_URL=http://127.0.0.1:18080

  flutter-windows:
    needs: changes
    if: >-
      always() &&
      needs.changes.result == 'success' &&
      (github.event_name == 'push' && github.ref == 'refs/heads/master' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full')) &&
      needs.changes.outputs.code == 'true' &&
      (needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.global == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.profile == 'full'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: src/frontend/.dart_tool/hooks_runner
          key: flutter-sqlite3-hooks-windows-${{ hashFiles('src/frontend/pubspec.lock') }}
      - name: Prefetch sqlite3mc native asset
        shell: pwsh
        run: ./scripts/ci/flutter-windows-prefetch-sqlite3.ps1
      - name: Flutter Windows analyze, test, build
        working-directory: src/frontend
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos
          flutter test
          flutter build windows --release --dart-define=VOICE_API_BASE_URL=http://127.0.0.1:18080 --dart-define=VOICE_APP_VERSION=1.0.0

  compose-e2e:
    needs: changes
    if: >-
      always() &&
      (
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && inputs.profile != 'auto') ||
        (
          github.event_name == 'push' &&
          github.ref == 'refs/heads/master' &&
          needs.changes.result == 'success' &&
          needs.changes.outputs.code == 'true' &&
          (
            needs.changes.outputs.compose == 'true' ||
            needs.changes.outputs.frontend == 'true' ||
            needs.changes.outputs.global == 'true' ||
            needs.changes.outputs.run_go == 'true'
          )
        )
      ) &&
      (needs.changes.result == 'success' || needs.changes.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare compose env
        run: cp .env.example .env
      - name: Start compose infra
        run: docker compose up -d
      - name: Wait for postgres
        run: |
          ready=0
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -h 127.0.0.1 -p 5432 -U voice -d voice; then
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            docker compose ps
            docker compose logs postgres --tail 80
            exit 1
          fi
          for i in $(seq 1 30); do
            if docker compose exec -T postgres psql -U voice -d voice -tAc \
              "SELECT 1 FROM pg_database WHERE datname='chat_db'" | grep -q 1; then
              exit 0
            fi
            sleep 2
          done
          docker compose ps
          docker compose logs postgres --tail 80
          exit 1
      - name: Migrate Go-owned databases
        run: make compose-migrate-all
      - name: Start app stack
        run: make compose-app-up
      - name: Wait for gateway health
        run: |
          for i in $(seq 1 72); do
            if curl -sf http://127.0.0.1:18080/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          exit 1
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Prefetch sqlite3mc native assets
        run: bash scripts/ci/flutter-linux-prefetch-sqlite3.sh host
      - name: Compose E2E smoke (all features)
        env:
          VOICE_RUN_LIVE_COMPOSE: "true"
          VOICE_API_BASE_URL: http://127.0.0.1:18080
        run: bash scripts/ci/compose-e2e-smoke.sh

  # --- Tier 3: nightly / manual full parity ---
  backend-go-integration:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.profile != 'auto')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        service:
          - analytics
          - bot
          - chat
          - federation
          - file
          - gateway
          - matchmaking
          - messaging
          - moderation
          - notification
          - realtime
          - role
          - search
          - social
          - space
          - story
          - subscription
          - user
          - voice
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Go mod tidy (${{ matrix.service }})
        working-directory: src/backend/${{ matrix.service }}
        run: go mod tidy
      - name: Go integration test (${{ matrix.service }})
        working-directory: src/backend/${{ matrix.service }}
        env:
          CGO_ENABLED: "0"
        run: go test ./...
      - name: Gateway race detector
        if: matrix.service == 'gateway'
        working-directory: src/backend/gateway
        run: CGO_ENABLED=1 go test -race ./...

  local-ci-parity:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.profile != 'auto')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Install buf CLI and golangci-lint
        run: |
          go install github.com/bufbuild/buf/cmd/buf@${{ env.BUF_VERSION }}
          go install ${{ env.GOLANGCI_LINT_MOD }}
      - name: Add GOBIN to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Install protoc_plugin
        run: |
          dart pub global activate protoc_plugin
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
      - name: Go mod tidy (all Go modules)
        run: |
          set -e
          for m in pkg analytics bot chat federation file gateway matchmaking messaging moderation notification realtime role search social space story subscription user voice; do
            (cd "src/backend/$m" && go mod tidy)
          done
      - name: Prefetch sqlite3mc native assets
        run: bash scripts/ci/flutter-linux-prefetch-sqlite3.sh host
      - name: make build-all
        run: make build-all
      - name: make flutter-ci
        run: make flutter-ci
