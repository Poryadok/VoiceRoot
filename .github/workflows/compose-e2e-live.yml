name: Compose E2E Live

on:
  workflow_dispatch:

env:
  GO_VERSION: "1.26"
  FLUTTER_VERSION: "3.41.7"

jobs:
  compose-e2e-live:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
          cache-key: flutter-${{ runner.os }}-${{ hashFiles('src/frontend/pubspec.lock') }}
          cache-path: |
            ~/.pub-cache
            src/frontend/.dart_tool

      - name: Compose app up
        run: make compose-app-up

      - name: Compose E2E live (full feature coverage)
        run: make compose-e2e-live
