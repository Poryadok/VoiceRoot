name: Staging deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Gateway image tag (git SHA from CI, or latest)"
        required: false
        default: "latest"
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || (
        github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && github.event.workflow_run.event == 'push'
        && github.event.workflow_run.head_branch == 'master'
        && vars.STAGING_DEPLOY_ENABLED == 'true'
      )
    environment: staging
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Image tag (workflow_dispatch)
        id: tag_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Image tag (after CI on master)
        id: tag_run
        if: github.event_name == 'workflow_run'
        run: echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Resolve gateway image
        id: image
        run: |
          set -eux
          BASE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          if [ -n "${{ steps.tag_dispatch.outputs.tag }}" ]; then
            TAG="${{ steps.tag_dispatch.outputs.tag }}"
          else
            TAG="${{ steps.tag_run.outputs.tag }}"
          fi
          echo "full=${BASE}/gateway:${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          set -eux
          mkdir -p ~/.kube
          echo "${{ secrets.STAGING_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify gateway image exists in GHCR
        env:
          IMAGE_FULL: ${{ steps.image.outputs.full }}
        run: |
          set -eux
          TAG="${{ steps.tag_dispatch.outputs.tag }}"
          if [ -z "${TAG}" ]; then
            TAG="${{ steps.tag_run.outputs.tag }}"
          fi
          if [ -z "${TAG}" ]; then
            TAG="latest"
          fi
          BASE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          REF="${BASE}/gateway:${TAG}"
          echo "Checking manifest: ${REF}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          if ! docker manifest inspect "${REF}" >/dev/null 2>&1; then
            echo "ERROR: Gateway image not found in GHCR: ${REF}" >&2
            if [ "${{ github.event_name }}" = "workflow_run" ]; then
              echo "Auto-deploy after minimal CI may skip docker push jobs. Re-run CI with profile full or push code that triggers image build." >&2
            else
              echo "For manual deploy use the git SHA from a green CI run on master, not stale latest." >&2
            fi
            exit 1
          fi

      - name: Apply staging manifests
        env:
          STAGING_APP_SECRETS_YAML_B64: ${{ secrets.STAGING_APP_SECRETS_YAML }}
          VOICE_DEVELOPER_PORTAL_INGRESS_HOST: ${{ vars.VOICE_DEVELOPER_PORTAL_INGRESS_HOST }}
          VOICE_GATEWAY_INGRESS_HOST: ${{ vars.VOICE_GATEWAY_INGRESS_HOST }}
          VOICE_GATEWAY_TLS_SECRET: ${{ vars.VOICE_GATEWAY_TLS_SECRET }}
          VOICE_K8S_NAMESPACE: ${{ vars.VOICE_K8S_NAMESPACE }}
        run: |
          set -eux
          # shellcheck disable=SC1091
          source scripts/staging/load-staging-domains.sh
          REGISTRY="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          TAG="${{ steps.tag_dispatch.outputs.tag }}"
          if [ -z "${TAG}" ]; then
            TAG="${{ steps.tag_run.outputs.tag }}"
          fi
          if [ -z "${TAG}" ]; then
            TAG="latest"
          fi
          export VOICE_IMAGE_REGISTRY="${REGISTRY}"
          export VOICE_IMAGE_TAG="${TAG}"
          export VOICE_K8S_NAMESPACE="${{ vars.VOICE_K8S_NAMESPACE }}"
          bash scripts/staging/render-and-apply.sh

      - name: Staging smoke (optional)
        if: vars.STAGING_SMOKE_ENABLED == 'true'
        env:
          VOICE_GATEWAY_INGRESS_HOST: ${{ vars.VOICE_GATEWAY_INGRESS_HOST }}
        run: |
          set -eux
          # shellcheck disable=SC1091
          source scripts/staging/load-staging-domains.sh
          export VOICE_STAGING_URL="https://${VOICE_GATEWAY_INGRESS_HOST}"
          bash scripts/staging/smoke-staging.sh
