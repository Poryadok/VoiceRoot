name: Staging deploy

on:
  workflow_call:
    inputs:
      image_tag:
        description: Git SHA image tag
        required: true
        type: string
      deploy_mode:
        description: full | app-only | images-only
        required: false
        type: string
        default: app-only
      changed_services:
        description: JSON array of changed image names
        required: false
        type: string
        default: "[]"
      needs_full_rollout:
        required: false
        type: string
        default: "false"
      needs_user_space_rollout:
        required: false
        type: string
        default: "false"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (git SHA from CI; required)"
        required: true
      deploy_mode:
        description: full | app-only | images-only
        required: false
        default: app-only
      changed_services:
        description: JSON array of changed image names
        required: false
        default: "[]"
      needs_full_rollout:
        required: false
        default: "false"
      needs_user_space_rollout:
        required: false
        default: "false"

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    # Home staging: set STAGING_RUNNER_LABELS=["self-hosted","Linux","X64","voice-staging"]
    # and install the runner on the k3s node (scripts/staging/setup-github-runner.sh).
    runs-on: ${{ vars.STAGING_RUNNER_LABELS != '' && fromJson(vars.STAGING_RUNNER_LABELS) || 'ubuntu-latest' }}
    environment: staging
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.image_tag }}

      - name: Download stack lock artifact
        if: github.event_name == 'workflow_call'
        uses: actions/download-artifact@v6
        with:
          name: staging-stack-lock
          path: .

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - uses: azure/setup-kubectl@v5

      - name: Configure kubectl (direct or SSH tunnel)
        env:
          STAGING_KUBECONFIG_B64: ${{ secrets.STAGING_KUBECONFIG }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_SSH_HOST: ${{ vars.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ vars.STAGING_SSH_USER }}
          STAGING_SSH_PORT: ${{ vars.STAGING_SSH_PORT }}
          STAGING_DEPLOY_VIA_SSH: ${{ vars.STAGING_DEPLOY_VIA_SSH }}
        run: bash scripts/staging/configure-kubectl-ci.sh

      - name: Verify staging images in GHCR
        id: verify_image
        run: |
          set -eux
          REGISTRY="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          export VOICE_IMAGE_REGISTRY="${REGISTRY}"
          export VOICE_IMAGE_TAG="${{ inputs.image_tag }}"
          if [ -f "${GITHUB_WORKSPACE}/stack.lock.yaml" ]; then
            export STACK_LOCK_FILE="${GITHUB_WORKSPACE}/stack.lock.yaml"
          fi
          bash scripts/staging/verify-staging-images.sh

      - name: Apply staging manifests
        env:
          STAGING_APP_SECRETS_YAML_B64: ${{ secrets.STAGING_APP_SECRETS_YAML }}
          STAGING_STAFF_TOKEN: ${{ secrets.STAGING_STAFF_TOKEN }}
          VOICE_DEVELOPER_PORTAL_INGRESS_HOST: ${{ vars.VOICE_DEVELOPER_PORTAL_INGRESS_HOST }}
          VOICE_GATEWAY_INGRESS_HOST: ${{ vars.VOICE_GATEWAY_INGRESS_HOST }}
          VOICE_WEB_INGRESS_HOST: ${{ vars.VOICE_WEB_INGRESS_HOST }}
          VOICE_ADMIN_INGRESS_HOST: ${{ vars.VOICE_ADMIN_INGRESS_HOST }}
          VOICE_LIVEKIT_INGRESS_HOST: ${{ vars.VOICE_LIVEKIT_INGRESS_HOST }}
          VOICE_GATEWAY_TLS_SECRET: ${{ vars.VOICE_GATEWAY_TLS_SECRET }}
          VOICE_K8S_NAMESPACE: ${{ vars.VOICE_K8S_NAMESPACE }}
          VOICE_IMAGE_PULL_SECRET: ${{ vars.VOICE_IMAGE_PULL_SECRET }}
          VOICE_APPLY_OBSERVABILITY: ${{ vars.VOICE_APPLY_OBSERVABILITY }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          NOTIFICATIONS_ENABLED: ${{ vars.STAGING_ALERTMANAGER_NOTIFICATIONS_ENABLED }}
          DEPLOY_MODE: ${{ inputs.deploy_mode }}
          NEEDS_FULL_ROLLOUT: ${{ inputs.needs_full_rollout }}
          NEEDS_USER_SPACE_ROLLOUT: ${{ inputs.needs_user_space_rollout }}
        run: |
          set -eux
          source scripts/staging/load-staging-domains.sh
          REGISTRY="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          TAG="${{ steps.verify_image.outputs.deploy_tag }}"
          if [ -z "${TAG}" ] && [ -f "${GITHUB_WORKSPACE}/stack.lock.yaml" ]; then
            TAG="$(grep '^tag:' "${GITHUB_WORKSPACE}/stack.lock.yaml" | awk '{print $2}')"
          fi
          if [ -z "${TAG}" ]; then
            TAG="${{ inputs.image_tag }}"
          fi
          export VOICE_IMAGE_REGISTRY="${REGISTRY}"
          export VOICE_IMAGE_TAG="${TAG}"
          export VOICE_K8S_NAMESPACE="${{ vars.VOICE_K8S_NAMESPACE }}"
          CHANGED_JSON='${{ inputs.changed_services }}'
          export CHANGED_SERVICES="$(echo "${CHANGED_JSON}" | jq -r 'join(",")')"
          bash scripts/staging/render-and-apply.sh

      - name: Staging smoke (optional)
        if: vars.STAGING_SMOKE_ENABLED == 'true'
        env:
          VOICE_GATEWAY_INGRESS_HOST: ${{ vars.VOICE_GATEWAY_INGRESS_HOST }}
          VOICE_WEB_INGRESS_HOST: ${{ vars.VOICE_WEB_INGRESS_HOST }}
          VOICE_DEVELOPER_PORTAL_INGRESS_HOST: ${{ vars.VOICE_DEVELOPER_PORTAL_INGRESS_HOST }}
          VOICE_ADMIN_INGRESS_HOST: ${{ vars.VOICE_ADMIN_INGRESS_HOST }}
          VOICE_LIVEKIT_INGRESS_HOST: ${{ vars.VOICE_LIVEKIT_INGRESS_HOST }}
          STAGING_STAFF_TOKEN: ${{ secrets.STAGING_STAFF_TOKEN }}
        run: |
          set -eux
          source scripts/staging/load-staging-domains.sh
          export VOICE_STAGING_URL="https://${VOICE_GATEWAY_INGRESS_HOST}"
          bash scripts/staging/smoke-staging.sh

      - name: Observability smoke (optional)
        if: vars.STAGING_OBSERVABILITY_SMOKE_ENABLED == 'true'
        env:
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: bash scripts/staging/smoke-observability.sh
