name: Staging deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (git SHA from CI, or latest)"
        required: false
        default: "latest"
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  packages: read
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch'
      || (
        github.event_name == 'workflow_run'
        && github.event.workflow_run.conclusion == 'success'
        && github.event.workflow_run.event == 'push'
        && github.event.workflow_run.head_branch == 'master'
        && vars.STAGING_DEPLOY_ENABLED == 'true'
      )
    environment: staging
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Image tag (workflow_dispatch)
        id: tag_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Image tag (after CI on master)
        id: tag_run
        if: github.event_name == 'workflow_run'
        run: echo "tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: image
        run: |
          set -eux
          if [ -n "${{ steps.tag_dispatch.outputs.tag }}" ]; then
            TAG="${{ steps.tag_dispatch.outputs.tag }}"
          else
            TAG="${{ steps.tag_run.outputs.tag }}"
          fi
          if [ -z "${TAG}" ]; then
            TAG="latest"
          fi
          echo "requested_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify CI published images (auto-deploy)
        id: push_check
        if: github.event_name == 'workflow_run'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          RUN_ID="${{ github.event.workflow_run.id }}"
          REPO="${{ github.repository }}"
          # Matrix legs are named "staging-images-push (<service>)", not the bare job id.
          # gh run view returns all jobs (API /jobs defaults to one page).
          PUSH_COUNT="$(gh run view "${RUN_ID}" --repo "${REPO}" --json jobs \
            --jq '[.jobs[] | select(.name | startswith("staging-images-push"))] | length')"
          if [ "${PUSH_COUNT}" -eq 0 ]; then
            echo "No staging-images-push jobs in triggering CI run; docs-only or non-code change."
            echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PUSH_FAILED="$(gh run view "${RUN_ID}" --repo "${REPO}" --json jobs \
            --jq '[.jobs[] | select(.name | startswith("staging-images-push")) | select(.conclusion != "success") | .name] | length')"
          if [ "${PUSH_FAILED}" -gt 0 ]; then
            gh run view "${RUN_ID}" --repo "${REPO}" --json jobs \
              --jq '.jobs[] | select(.name | startswith("staging-images-push")) | select(.conclusion != "success") | "\(.name): \(.conclusion)"' >&2
            echo "ERROR: one or more staging-images-push matrix jobs did not succeed." >&2
            exit 1
          fi
          echo "skip_deploy=false" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4
        if: github.event_name == 'workflow_dispatch' || steps.push_check.outputs.skip_deploy != 'true'

      - uses: azure/setup-kubectl@v5
        if: github.event_name == 'workflow_dispatch' || steps.push_check.outputs.skip_deploy != 'true'

      - name: Configure kubectl (direct or SSH tunnel)
        if: github.event_name == 'workflow_dispatch' || steps.push_check.outputs.skip_deploy != 'true'
        env:
          STAGING_KUBECONFIG_B64: ${{ secrets.STAGING_KUBECONFIG }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_SSH_HOST: ${{ vars.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ vars.STAGING_SSH_USER }}
          STAGING_SSH_PORT: ${{ vars.STAGING_SSH_PORT }}
          STAGING_DEPLOY_VIA_SSH: ${{ vars.STAGING_DEPLOY_VIA_SSH }}
        run: bash scripts/staging/configure-kubectl-ci.sh

      - name: Verify staging images in GHCR
        id: verify_image
        if: github.event_name == 'workflow_dispatch' || steps.push_check.outputs.skip_deploy != 'true'
        run: |
          set -eux
          REGISTRY="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          TAG="${{ steps.image.outputs.requested_tag }}"
          export VOICE_IMAGE_REGISTRY="${REGISTRY}"
          export VOICE_IMAGE_TAG="${TAG}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export STAGING_IMAGE_ALLOW_LATEST_FALLBACK=true
          else
            export STAGING_IMAGE_ALLOW_LATEST_FALLBACK=false
          fi
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          bash scripts/staging/verify-staging-images.sh

      - name: Apply staging manifests
        if: github.event_name == 'workflow_dispatch' || steps.push_check.outputs.skip_deploy != 'true'
        env:
          STAGING_APP_SECRETS_YAML_B64: ${{ secrets.STAGING_APP_SECRETS_YAML }}
          STAGING_STAFF_TOKEN: ${{ secrets.STAGING_STAFF_TOKEN }}
          VOICE_DEVELOPER_PORTAL_INGRESS_HOST: ${{ vars.VOICE_DEVELOPER_PORTAL_INGRESS_HOST }}
          VOICE_GATEWAY_INGRESS_HOST: ${{ vars.VOICE_GATEWAY_INGRESS_HOST }}
          VOICE_WEB_INGRESS_HOST: ${{ vars.VOICE_WEB_INGRESS_HOST }}
          VOICE_ADMIN_INGRESS_HOST: ${{ vars.VOICE_ADMIN_INGRESS_HOST }}
          VOICE_LIVEKIT_INGRESS_HOST: ${{ vars.VOICE_LIVEKIT_INGRESS_HOST }}
          VOICE_GATEWAY_TLS_SECRET: ${{ vars.VOICE_GATEWAY_TLS_SECRET }}
          VOICE_K8S_NAMESPACE: ${{ vars.VOICE_K8S_NAMESPACE }}
          VOICE_IMAGE_PULL_SECRET: ${{ vars.VOICE_IMAGE_PULL_SECRET }}
          VOICE_APPLY_OBSERVABILITY: ${{ vars.VOICE_APPLY_OBSERVABILITY }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          NOTIFICATIONS_ENABLED: ${{ vars.STAGING_ALERTMANAGER_NOTIFICATIONS_ENABLED }}
        run: |
          set -eux
          # shellcheck disable=SC1091
          source scripts/staging/load-staging-domains.sh
          REGISTRY="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          TAG="${{ steps.verify_image.outputs.deploy_tag }}"
          if [ -z "${TAG}" ]; then
            TAG="${{ steps.image.outputs.requested_tag }}"
          fi
          if [ -z "${TAG}" ]; then
            TAG="latest"
          fi
          export VOICE_IMAGE_REGISTRY="${REGISTRY}"
          export VOICE_IMAGE_TAG="${TAG}"
          export VOICE_K8S_NAMESPACE="${{ vars.VOICE_K8S_NAMESPACE }}"
          bash scripts/staging/render-and-apply.sh

      - name: Staging smoke (optional)
        if: >-
          (github.event_name == 'workflow_dispatch' || steps.push_check.outputs.skip_deploy != 'true')
          && vars.STAGING_SMOKE_ENABLED == 'true'
        env:
          VOICE_GATEWAY_INGRESS_HOST: ${{ vars.VOICE_GATEWAY_INGRESS_HOST }}
          VOICE_WEB_INGRESS_HOST: ${{ vars.VOICE_WEB_INGRESS_HOST }}
          VOICE_DEVELOPER_PORTAL_INGRESS_HOST: ${{ vars.VOICE_DEVELOPER_PORTAL_INGRESS_HOST }}
          VOICE_ADMIN_INGRESS_HOST: ${{ vars.VOICE_ADMIN_INGRESS_HOST }}
          VOICE_LIVEKIT_INGRESS_HOST: ${{ vars.VOICE_LIVEKIT_INGRESS_HOST }}
          STAGING_STAFF_TOKEN: ${{ secrets.STAGING_STAFF_TOKEN }}
        run: |
          set -eux
          # shellcheck disable=SC1091
          source scripts/staging/load-staging-domains.sh
          export VOICE_STAGING_URL="https://${VOICE_GATEWAY_INGRESS_HOST}"
          bash scripts/staging/smoke-staging.sh

      - name: Observability smoke (optional)
        if: >-
          (github.event_name == 'workflow_dispatch' || steps.push_check.outputs.skip_deploy != 'true')
          && vars.STAGING_OBSERVABILITY_SMOKE_ENABLED == 'true'
        env:
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: bash scripts/staging/smoke-observability.sh

      - name: Auto-deploy skipped (no new images)
        if: github.event_name == 'workflow_run' && steps.push_check.outputs.skip_deploy == 'true'
        run: echo "CI did not push images; staging cluster left unchanged."
